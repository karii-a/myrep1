<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kareena Acharya – Code Artist, Design Enthusiast, and Problem Solver based in Kathmandu, Nepal." />
  <meta property="og:title"       content="Kareena Acharya | Portfolio" />
  <meta property="og:description" content="Code Artist · Design Enthusiast · Problem Solver" />
  <meta property="og:type"        content="website" />
  <title>Kareena Acharya | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <div class="flower-canvas" aria-hidden="true"></div>
  <main class="page-main" id="main-content">
    <section class="hero" aria-label="Introduction">
      <div class="hero-inner">
        <article class="profile-card" aria-label="Kareena Acharya profile card">
          <span class="blob blob--1" aria-hidden="true"></span>
          <span class="blob blob--2" aria-hidden="true"></span>
          <span class="blob blob--3" aria-hidden="true"></span>
          <span class="blob blob--4" aria-hidden="true"></span>
          <div class="profile-avatar-wrap">
            <img
              src="myimg.jpg"
              alt="Kareena Acharya"
              width="150" height="150"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
            />
            <div class="avatar-fallback" aria-label="Profile photo placeholder">
              <i class="fas fa-user" aria-hidden="true"></i>
            </div>
          </div>
          <p id="js-greeting" class="greeting-text" aria-live="polite" aria-label="Greeting in various languages"></p>
          <p class="intro-label" aria-hidden="true">I'M</p>
          <h1 class="profile-name">Kareena Acharya</h1>
          <p class="profile-bio">
            Blending art, technology, and ethics, I create solutions
            that are both meaningful and make a real difference.
          </p>
          <ul class="tag-list" aria-label="Roles">
            <li class="tag tag--1"><i class="fas fa-code"        aria-hidden="true"></i> Code Artist</li>
            <li class="tag tag--2"><i class="fas fa-paint-brush" aria-hidden="true"></i> Design Enthusiast</li>
            <li class="tag tag--3"><i class="fas fa-lightbulb"   aria-hidden="true"></i> Problem Solver</li>
          </ul>
        </article>

        <ul class="social-row" aria-label="Social media links">
          <li>
            <a href="https://github.com/karii-a" target="_blank" rel="noopener noreferrer"
               class="social-btn" aria-label="GitHub">
              <i class="fab fa-github" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="https://www.linkedin.com/in/kareena-acharya-bb0757289/" target="_blank" rel="noopener noreferrer"
               class="social-btn" aria-label="LinkedIn">
              <i class="fab fa-linkedin-in" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="https://www.instagram.com/not_me_1306/" target="_blank" rel="noopener noreferrer"
               class="social-btn" aria-label="Instagram">
              <i class="fab fa-instagram" aria-hidden="true"></i>
            </a>
          </li>
        </ul>

        <div class="cta-row">
          <a href="contact.html"  class="btn btn-primary">Get In Touch</a>
          <a href="projects.html" class="btn btn-outline">View My Work</a>
        </div>
      </div>
    </section>
  </main>
  <script src="js/components.js" defer></script>
  <script src="js/main.js"       defer></script>
  <script src="js/home.js"       defer></script>
</body>
</html>
