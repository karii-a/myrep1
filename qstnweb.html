<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>IS/IT Study Guide — All Modules + Exams</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d0f14;
        --surface: #161922;
        --surface2: #1e2230;
        --surface3: #232840;
        --border: #2a2f42;
        --accent: #5b8af0;
        --accent2: #e8a838;
        --accent3: #4ecba0;
        --accent4: #e05c6b;
        --accent5: #b06ef5;
        --text: #dce3f0;
        --muted: #7a85a0;
        --green: #4ecba0;
        --green-bg: rgba(78, 203, 160, 0.12);
        --red: #e05c6b;
        --red-bg: rgba(224, 92, 107, 0.12);
        --amber: #e8a838;
        --amber-bg: rgba(232, 168, 56, 0.12);
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        line-height: 1.7;
        min-height: 100vh;
      }
      a {
        color: var(--accent);
      }

      /* HEADER */
      .site-header {
        text-align: center;
        padding: 3rem 1rem 2rem;
        border-bottom: 1px solid var(--border);
      }
      .site-header h1 {
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -1px;
        margin-bottom: 6px;
      }
      .site-header h1 span {
        color: var(--accent2);
      }
      .site-header p {
        color: var(--muted);
        font-size: 0.95rem;
      }
      .progress-wrap {
        max-width: 320px;
        margin: 1.5rem auto 0;
      }
      .progress-bar {
        background: var(--surface2);
        border-radius: 99px;
        height: 7px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .progress-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--accent), var(--accent3));
        transition: width 0.4s;
      }
      .progress-label {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
        text-align: center;
      }

      /* NAV */
      nav {
        position: sticky;
        top: 0;
        background: rgba(13, 15, 20, 0.97);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        z-index: 100;
        overflow-x: auto;
      }
      nav::-webkit-scrollbar {
        display: none;
      }
      .nav-inner {
        display: flex;
        gap: 0;
        min-width: max-content;
        padding: 0 1rem;
      }
      .tab-btn {
        padding: 0 1rem;
        height: 48px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        white-space: nowrap;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .tab-btn:hover {
        color: var(--text);
      }
      .tab-btn.active {
        color: var(--accent);
        border-color: var(--accent);
      }
      .tab-btn.done {
        color: var(--green);
      }
      .tab-btn.done.active {
        color: var(--green);
        border-color: var(--green);
      }

      /* MAIN */
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 2rem 1.25rem 6rem;
      }
      .pane {
        display: none;
      }
      .pane.active {
        display: block;
      }

      /* HOME GRID */
      .home-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        margin-top: 1rem;
      }
      .home-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.1rem 1.3rem;
        cursor: pointer;
        transition:
          border-color 0.2s,
          transform 0.15s;
      }
      .home-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .home-card.done-card {
        border-color: var(--green);
      }
      .home-card-num {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .home-card-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .home-card-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
        transition: background 0.3s;
      }

      /* INNER TABS */
      .inner-tab-row {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .inner-tab {
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        transition: all 0.15s;
      }
      .inner-tab:hover {
        color: var(--text);
        background: var(--surface3);
      }
      .inner-tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* MODULE NOTES */
      .module-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.75rem;
      }
      .module-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .module-sub {
        font-size: 13px;
        color: var(--muted);
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0;
      }

      .sec-head {
        font-size: 15px;
        font-weight: 700;
        margin: 2rem 0 0.9rem;
        color: var(--text);
      }
      .content-p {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.8;
        margin-bottom: 0.8rem;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
        margin: 0.75rem 0 1rem;
      }
      .kcard {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
      }
      .kcard-title {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px;
        color: var(--text);
      }
      .kcard-body {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.65;
      }

      .hl-box {
        border-left: 3px solid var(--accent);
        background: rgba(91, 138, 240, 0.09);
        border-radius: 0 10px 10px 0;
        padding: 0.85rem 1.1rem;
        margin: 1.25rem 0;
        font-size: 13px;
        line-height: 1.75;
        color: var(--text);
      }

      .start-quiz-btn {
        display: block;
        width: 100%;
        margin-top: 2rem;
        padding: 13px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .start-quiz-btn:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }

      /* QUIZ */
      .quiz-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.75rem;
      }
      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .quiz-count {
        font-size: 13px;
        color: var(--muted);
      }
      .quiz-score {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
      }
      .qbar {
        background: var(--surface2);
        border-radius: 99px;
        height: 5px;
        margin-bottom: 1.5rem;
        overflow: hidden;
      }
      .qbar-fill {
        height: 100%;
        border-radius: 99px;
        background: var(--accent);
        transition: width 0.3s;
      }

      .question-text {
        font-size: 17px;
        font-weight: 600;
        line-height: 1.5;
        margin-bottom: 1.25rem;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 1.5rem;
      }
      .opt-btn {
        text-align: left;
        padding: 11px 15px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        font-size: 14px;
        color: var(--text);
        transition: all 0.15s;
        line-height: 1.5;
      }
      .opt-btn:hover:not(:disabled) {
        background: rgba(91, 138, 240, 0.12);
        border-color: var(--accent);
        color: var(--text);
      }
      .opt-btn.correct {
        background: var(--green-bg);
        border-color: var(--green);
        color: var(--green);
        font-weight: 600;
      }
      .opt-btn.wrong {
        background: var(--red-bg);
        border-color: var(--red);
        color: var(--red);
      }
      .opt-btn:disabled {
        cursor: default;
      }

      .feedback-box {
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 1.25rem;
        line-height: 1.7;
        display: none;
      }
      .feedback-box.correct {
        background: var(--green-bg);
        color: var(--green);
        display: block;
      }
      .feedback-box.wrong {
        background: var(--red-bg);
        color: var(--red);
        display: block;
      }

      .btn-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .next-btn {
        padding: 9px 20px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: none;
        transition: opacity 0.2s;
      }
      .next-btn:hover {
        opacity: 0.88;
      }
      .back-btn {
        padding: 9px 14px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .back-btn:hover {
        background: var(--surface2);
      }

      /* RESULTS */
      .results-wrap {
        text-align: center;
        padding: 2rem 1rem 1rem;
      }
      .results-big {
        font-size: 58px;
        font-weight: 800;
        letter-spacing: -3px;
        line-height: 1;
      }
      .results-pct {
        font-size: 14px;
        color: var(--muted);
        margin: 0.4rem 0 1.5rem;
      }
      .results-msg {
        font-size: 14px;
        font-weight: 600;
        display: inline-block;
        padding: 8px 18px;
        border-radius: 8px;
        margin-bottom: 1.5rem;
      }
      .results-btns {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }
      .rbtn {
        padding: 9px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .rbtn:hover {
        opacity: 0.85;
      }
      .rbtn-primary {
        background: var(--accent);
        color: #fff;
        border: none;
      }
      .rbtn-secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }

      /* REVIEW */
      .review-list {
        margin-top: 1.5rem;
      }
      .review-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 0.75rem;
        background: var(--surface);
      }
      .review-q {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .review-correct-ans {
        color: var(--green);
        font-size: 12px;
        margin-bottom: 3px;
      }
      .review-wrong-ans {
        color: var(--red);
        font-size: 12px;
      }
      .review-exp {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <div class="site-header">
      <h1>IS/IT <span>Study Guide</span></h1>
      <p>
        10 modules · Study notes + 8-question quiz per topic · 80 questions
        total
      </p>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="globalBar" style="width: 0%"></div>
        </div>
        <div class="progress-label" id="globalLabel">
          0 of 10 modules completed
        </div>
      </div>
    </div>

    <nav><div class="nav-inner" id="navInner"></div></nav>
    <main id="mainArea"></main>

    <script>
      const MODULES = [
        {
          id: "is-strategy",
          title: "IS Strategy",
          sub: "IS vs IT · Strategic Objectives · Digital Firm · Constraints",
          content: [
            {
              type: "hl",
              text: "<strong>The Car & Road Analogy:</strong> IS = the car (the WHAT — creates value, defines what the business needs). IT = the road (the HOW — infrastructure to deliver it). IS/IT Alignment = the degree to which IS/IT supports actual business goals.",
            },
            { type: "h", text: "Six Strategic IS Objectives" },
            {
              type: "cards",
              items: [
                {
                  t: "1. Operational Excellence",
                  b: "Efficiency improvements for higher profitability. E.g. Amazon's automated warehouses optimise delivery routes in real time.",
                },
                {
                  t: "2. New Products & Services",
                  b: "Enabling innovation and market expansion. E.g. Uber's entire service model is built on IS (GPS, mobile app, payments).",
                },
                {
                  t: "3. Customer & Supplier Intimacy",
                  b: "Serving customers well = returning revenue. E.g. Amazon recommends products based on past purchases.",
                },
                {
                  t: "4. Improved Decision Making",
                  b: "Real data replaces guesswork. E.g. POS sales data tells stores exactly how much stock to order.",
                },
                {
                  t: "5. Competitive Advantage",
                  b: "Better performance or lower cost. E.g. Apple's ecosystem (iPhone + iCloud + App Store) locks customers in.",
                },
                {
                  t: "6. Survival",
                  b: "Technology as necessity. E.g. restaurants that adopted online ordering during COVID survived; those that didn't struggled.",
                },
              ],
            },
            { type: "h", text: "Four Worldwide Changes Affecting Business" },
            {
              type: "cards",
              items: [
                {
                  t: "Global Economy",
                  b: "Markets are no longer local. Companies compete internationally and must coordinate globally.",
                },
                {
                  t: "Industrial Transformation",
                  b: "Shift from manufacturing to information-driven value creation. Knowledge workers and data generate more value.",
                },
                {
                  t: "Business Enterprise",
                  b: "Flatter hierarchies, remote work, digital collaboration, decentralised decision-making.",
                },
                {
                  t: "Digital Firm",
                  b: "Core processes completed digitally, key assets managed digitally. Operates 24/7 across time and space.",
                },
              ],
            },
            { type: "h", text: "IS Strategy Constraints" },
            {
              type: "cards",
              items: [
                {
                  t: "Lack of Awareness",
                  b: "Stakeholders don't understand IS impact — they underinvest or misalign technology with goals.",
                },
                {
                  t: "Credibility Gap",
                  b: "Management doesn't trust that IS delivers what it promises — perceived reliability gap.",
                },
                {
                  t: "Resource Mismanagement",
                  b: "Not treating information as a strategic resource to be actively managed — poor data quality.",
                },
                {
                  t: "Financial Myopia",
                  b: "Demanding immediate ROI on every IS investment — blocking long-term infrastructure that pays off over years.",
                },
                {
                  t: "Short-Term Focus",
                  b: "Prioritising quick wins over strategic architecture — systems become fragmented and impossible to integrate.",
                },
              ],
            },
            { type: "h", text: "Symptoms of Ineffective IS Strategy" },
            {
              type: "cards",
              items: [
                {
                  t: "Missed Opportunities",
                  b: "No e-commerce = no online sales. Business opportunities left unexploited due to system limitations.",
                },
                {
                  t: "Competitors Gain Advantage",
                  b: "Britannica relied on print; Microsoft launched Encarta digitally. Britannica's IS strategy was frozen in the past.",
                },
                {
                  t: "Unattainable Goals",
                  b: "Business goals become impossible because systems aren't integrated — sales, inventory, accounts use incompatible systems.",
                },
                {
                  t: "Constant Shifting Priorities",
                  b: "No clear IS direction causes conflict between departments and chronically poor productivity.",
                },
              ],
            },
          ],
          questions: [
            {
              q: 'What does the "car and road" analogy represent in IS/IT?',
              opts: [
                "IS = road (infrastructure), IT = car (value)",
                "IS = car (WHAT the business needs), IT = road (HOW to deliver it)",
                "IS and IT are the same concept",
                "IT defines business needs, IS delivers them",
              ],
              ans: 1,
              exp: "IS (the car) defines WHAT the business needs and creates value. IT (the road) is the infrastructure that delivers it — the HOW.",
            },
            {
              q: "Which strategic IS objective does Amazon's recommender system best illustrate?",
              opts: [
                "Operational Excellence",
                "Survival",
                "Customer and Supplier Intimacy",
                "Improved Decision Making",
              ],
              ans: 2,
              exp: "Using customer data to personalise recommendations improves the customer relationship and drives repeat purchases — this is Customer and Supplier Intimacy.",
            },
            {
              q: "A company blocks IS investment because they want immediate financial returns. This is:",
              opts: [
                "Credibility Gap",
                "Short-Term Focus",
                "Financial Myopia",
                "Lack of Awareness",
              ],
              ans: 2,
              exp: "Financial Myopia = demanding immediate financial justification for every IS investment, blocking long-term infrastructure that pays off over years.",
            },
            {
              q: "Which worldwide change describes how companies now have flatter hierarchies and remote work?",
              opts: [
                "Emergence of the Global Economy",
                "The Emerging Digital Firm",
                "Transformation of the Business Enterprise",
                "Transformation of Industrial Economies",
              ],
              ans: 2,
              exp: "Transformation of the Business Enterprise describes how companies are now structured — flatter hierarchies, remote work, digital collaboration.",
            },
            {
              q: "IS/IT Alignment refers to:",
              opts: [
                "Purchasing the latest hardware to match business goals",
                "The degree to which IS/IT supports actual business goals",
                "Installing software that matches IT standards",
                "Aligning employee salaries with IT budgets",
              ],
              ans: 1,
              exp: "IS/IT Alignment = the degree to which the IS/IT department understands business goals and uses its resources to support them.",
            },
            {
              q: "A retailer with no online presence loses revenue to digital competitors. This is a symptom of:",
              opts: [
                "Credibility Gap",
                "Financial Myopia",
                "Missed Opportunities from ineffective IS strategy",
                "Operational Excellence",
              ],
              ans: 2,
              exp: "Missed Opportunities = business opportunities left unexploited due to system limitations — such as no e-commerce presence.",
            },
            {
              q: "Projected IoT connected devices by 2026:",
              opts: ["5 billion", "10 billion", "22 billion", "100 billion"],
              ans: 2,
              exp: "The study guide projects approximately 22 billion devices connected through IoT by 2026.",
            },
            {
              q: "What is an Information System (IS)?",
              opts: [
                "A network of cables and servers only",
                "Hardware and software only",
                "A collection of hardware, software, data, people and processes producing quality information for decisions",
                "Only the software used by a business",
              ],
              ans: 2,
              exp: "IS = a collection of hardware, software, data, people and processes that work together to produce quality information for decision-making.",
            },
          ],
        },
        {
          id: "porter5",
          title: "Porter's 5 Forces",
          sub: "Competitive Analysis · Industry Profitability · Strategic Positioning",
          content: [
            {
              type: "p",
              text: "Developed in 1979 by Michael Porter (Harvard). Identifies five fundamental pressures that shape a firm's fate and determine an industry's long-term profitability. The goal: find a position that best defends against these forces — or shapes them in your favour.",
            },
            { type: "h", text: "The Five Forces" },
            {
              type: "cards",
              items: [
                {
                  t: "1. Competitive Rivalry",
                  b: "Intensity among existing players. High rivalry → price wars, lower margins. Caused by many competitors, slow growth, low differentiation. This is the central force — others feed into it.",
                },
                {
                  t: "2. Threat of New Entrants",
                  b: "How easily new competitors can enter. High barriers (capital, patents, regulations) = low threat. Low barriers (easy tech) = constant challengers.",
                },
                {
                  t: "3. Bargaining Power of Buyers",
                  b: "Powerful buyers force prices down. Power increases with large purchase volumes, undifferentiated products, low switching costs.",
                },
                {
                  t: "4. Bargaining Power of Suppliers",
                  b: "Powerful suppliers raise input prices. Power increases when few alternatives exist, products are differentiated, switching costs are high.",
                },
                {
                  t: "5. Threat of Substitutes",
                  b: "Products from a different industry serving the same need. Netflix substituted cable TV. Substitutes place a ceiling on prices firms can charge.",
                },
              ],
            },
            {
              type: "hl",
              text: "<strong>Economies of Scale:</strong> Fixed cost of $1,000 for 10 units = $100 each. Same $1,000 for 50 units = $20 each. Large incumbents can undercut new entrants on price — this is why economies of scale are a key barrier to entry.",
            },
            { type: "h", text: "Applying the Framework — 4 Steps" },
            {
              type: "cards",
              items: [
                {
                  t: "Step 1: Define the Industry",
                  b: '"Smartphones" vs "consumer electronics" yields very different analyses — scope matters.',
                },
                {
                  t: "Step 2: Analyse the Forces",
                  b: "Identify players, competitors, substitutes, and entry barriers. Gather evidence for each force.",
                },
                {
                  t: "Step 3: Assess Attractiveness",
                  b: "Conclude whether structural profitability is high or low — is this industry worth competing in?",
                },
                {
                  t: "Step 4: Formulate Strategy",
                  b: "Identify positions where forces are weakest and design your strategy accordingly.",
                },
              ],
            },
          ],
          questions: [
            {
              q: "Walmart demands dramatically lower prices from suppliers due to purchase volume. This illustrates:",
              opts: [
                "High Threat of New Entrants",
                "High Bargaining Power of Buyers",
                "High Competitive Rivalry",
                "High Threat of Substitutes",
              ],
              ans: 1,
              exp: "Walmart's immense scale = large purchase volumes = high bargaining power over suppliers. This is Bargaining Power of Buyers.",
            },
            {
              q: "Airlines require billions in capital and government approvals to enter. This represents:",
              opts: [
                "High Threat of Substitutes",
                "Low Competitive Rivalry",
                "High barriers to entry — Low Threat of New Entrants",
                "High Bargaining Power of Suppliers",
              ],
              ans: 2,
              exp: "High capital, government approvals, and airport slots = barriers to entry. Therefore the threat of new entrants for airlines is LOW.",

              exp: "Product Limitations = perishable foods spoil in transit and customers want to physically inspect quality — poor fits for pure online commerce.",
            },
            {
              q: "Layered security in e-commerce includes:",
              opts: [
                "Just an SSL certificate",
                "Only a password requirement",
                "WAF, CDN security, application-level and database security working together",
                "A single strong firewall",
              ],
              ans: 2,
              exp: "Layered Security = multiple overlapping security layers (WAF, CDN, application, database) — multiple obstacles attackers must break through sequentially.",
            },
            {
              q: "AI-driven price monitoring enables businesses to:",
              opts: [
                "Set prices once annually",
                "Instantly compare rivals' pricing and respond dynamically in real time",
                "Eliminate the need for human pricing teams",
                "Guarantee the lowest price always",
              ],
              ans: 1,
              exp: "AI-Driven Price Monitoring = instantly compares competitor pricing and policies in real time — enabling dynamic responses without manual monitoring.",
            },
          ],
        },
      ];

      const scores = {},
        completed = {};

      function updateGlobalProgress() {
        const done = Object.keys(completed).length;
        const pct = Math.round((done / MODULES.length) * 100);
        document.getElementById("globalBar").style.width = pct + "%";
        document.getElementById("globalLabel").textContent =
          done + " of " + MODULES.length + " modules completed";
        document.querySelectorAll(".tab-btn[data-mid]").forEach((btn) => {
          const mid = btn.dataset.mid;
          if (mid === "home") return;
          btn.classList.toggle("done", !!completed[mid]);
        });
        document.querySelectorAll(".home-card").forEach((card) => {
          const mid = card.dataset.mid;
          card.classList.toggle("done-card", !!completed[mid]);
          const dot = card.querySelector(".status-dot");
          const lbl = card.querySelector(".status-lbl");
          if (completed[mid]) {
            dot.style.background = "var(--green)";
            lbl.textContent = "Completed · " + scores[mid] + "/8";
            lbl.style.color = "var(--green)";
          } else {
            dot.style.background = "var(--border)";
            lbl.textContent = "Not started";
            lbl.style.color = "var(--muted)";
          }
        });
      }

      function showTab(id) {
        document
          .querySelectorAll(".pane")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        const pane = document.getElementById("pane-" + id);
        if (pane) pane.classList.add("active");
        const btn = document.querySelector('.tab-btn[data-mid="' + id + '"]');
        if (btn) btn.classList.add("active");
        window.scrollTo(0, 0);
      }

      function buildContent(blocks) {
        return blocks
          .map((b) => {
            if (b.type === "p")
              return '<p class="content-p">' + b.text + "</p>";
            if (b.type === "h")
              return '<div class="sec-head">' + b.text + "</div>";
            if (b.type === "hl")
              return '<div class="hl-box">' + b.text + "</div>";
            if (b.type === "cards")
              return (
                '<div class="card-grid">' +
                b.items
                  .map(
                    (i) =>
                      '<div class="kcard"><div class="kcard-title">' +
                      i.t +
                      '</div><div class="kcard-body">' +
                      i.b +
                      "</div></div>",
                  )
                  .join("") +
                "</div>"
              );
            return "";
          })
          .join("");
      }

      function buildQuizComponent(mod) {
        const qs = mod.questions;
        let current = 0,
          userAnswers = [],
          answered = false;
        const wrap = document.createElement("div");

        function render() {
          if (current >= qs.length) {
            showResults();
            return;
          }
          const q = qs[current];
          answered = false;
          const score = userAnswers.filter((a, i) => a === qs[i].ans).length;
          wrap.innerHTML = `
      <div class="quiz-wrap">
        <div class="quiz-meta">
          <span class="quiz-count">Question ${current + 1} of ${qs.length}</span>
          <span class="quiz-score">Score: ${score}/${current}</span>
        </div>
        <div class="qbar"><div class="qbar-fill" style="width:${(current / qs.length) * 100}%"></div></div>
        <div class="question-text">${q.q}</div>
        <div class="options">${q.opts.map((o, i) => `<button class="opt-btn" data-i="${i}">${o}</button>`).join("")}</div>
        <div class="feedback-box" id="fb"></div>
        <div class="btn-row">
          <button class="next-btn" id="nxt">${current < qs.length - 1 ? "Next →" : "See results →"}</button>
        </div>
      </div>`;
          wrap.querySelectorAll(".opt-btn").forEach((btn) => {
            btn.addEventListener("click", function () {
              if (answered) return;
              answered = true;
              const chosen = parseInt(this.dataset.i);
              userAnswers[current] = chosen;
              wrap.querySelectorAll(".opt-btn").forEach((b, i) => {
                b.disabled = true;
                if (i === q.ans) b.classList.add("correct");
                if (i === chosen && chosen !== q.ans) b.classList.add("wrong");
              });
              const fb = wrap.querySelector("#fb");
              fb.className =
                "feedback-box " + (chosen === q.ans ? "correct" : "wrong");
              fb.textContent =
                (chosen === q.ans ? "✓ Correct! " : "✗ Not quite. ") + q.exp;
              wrap.querySelector("#nxt").style.display = "inline-block";
            });
          });
          wrap.querySelector("#nxt").addEventListener("click", () => {
            current++;
            render();
          });
        }

        function showResults() {
          const score = userAnswers.filter((a, i) => a === qs[i].ans).length;
          const pct = Math.round((score / qs.length) * 100);
          scores[mod.id] = score;
          completed[mod.id] = true;
          updateGlobalProgress();
          const colour =
            pct >= 88
              ? "var(--green)"
              : pct >= 62
                ? "var(--amber)"
                : "var(--red)";
          const bg =
            pct >= 88
              ? "var(--green-bg)"
              : pct >= 62
                ? "var(--amber-bg)"
                : "var(--red-bg)";
          const msg =
            pct >= 88
              ? "Excellent — you have mastered this topic!"
              : pct >= 62
                ? "Good work — review the highlighted areas."
                : "Keep studying — revisit the notes above.";
          const review = qs
            .map((q, i) => {
              const ok = userAnswers[i] === q.ans;
              return `<div class="review-item">
        <div class="review-q">${i + 1}. ${q.q}</div>
        <div class="review-correct-ans">✓ ${q.opts[q.ans]}</div>
        ${!ok ? '<div class="review-wrong-ans">✗ Your answer: ' + (q.opts[userAnswers[i]] || "Not answered") + "</div>" : ""}
        <div class="review-exp">${q.exp}</div>
      </div>`;
            })
            .join("");
          wrap.innerHTML = `
      <div class="quiz-wrap">
        <div class="results-wrap">
          <div class="results-big" style="color:${colour}">${score}/${qs.length}</div>
          <div class="results-pct">${pct}% correct</div>
          <div class="results-msg" style="background:${bg};color:${colour}">${msg}</div>
          <div class="results-btns">
            <button class="rbtn rbtn-primary" id="retake">Retake quiz</button>
            <button class="rbtn rbtn-secondary" id="notes-btn">Back to notes</button>
          </div>
        </div>
        <div class="review-list">${review}</div>
      </div>`;
          wrap.querySelector("#retake").addEventListener("click", () => {
            current = 0;
            userAnswers = [];
            render();
          });
          wrap.querySelector("#notes-btn").addEventListener("click", () => {
            document.getElementById("inner-notes-" + mod.id).click();
          });
        }

        render();
        return wrap;
      }

      function buildModulePane(mod) {
        const pane = document.createElement("div");
        pane.className = "pane";
        pane.id = "pane-" + mod.id;

        const tabRow = document.createElement("div");
        tabRow.className = "inner-tab-row";

        const notesBtn = document.createElement("button");
        notesBtn.className = "inner-tab active";
        notesBtn.id = "inner-notes-" + mod.id;
        notesBtn.textContent = "Study Notes";
        const quizBtn = document.createElement("button");
        quizBtn.className = "inner-tab";
        quizBtn.textContent = "Quiz (" + mod.questions.length + " questions)";
        tabRow.appendChild(notesBtn);
        tabRow.appendChild(quizBtn);

        const notesDiv = document.createElement("div");
        notesDiv.innerHTML = `<div class="module-wrap">
    <div class="module-title">${mod.title}</div>
    <div class="module-sub">${mod.sub}</div>
    ${buildContent(mod.content)}
    <button class="start-quiz-btn" id="goto-quiz-${mod.id}">Start Quiz →</button>
  </div>`;

        const quizDiv = document.createElement("div");
        quizDiv.style.display = "none";
        const quizComp = buildQuizComponent(mod);
        quizDiv.appendChild(quizComp);

        notesBtn.addEventListener("click", () => {
          notesBtn.classList.add("active");
          quizBtn.classList.remove("active");
          notesDiv.style.display = "";
          quizDiv.style.display = "none";
        });
        quizBtn.addEventListener("click", () => {
          quizBtn.classList.add("active");
          notesBtn.classList.remove("active");
          quizDiv.style.display = "";
          notesDiv.style.display = "none";
        });

        pane.appendChild(tabRow);
        pane.appendChild(notesDiv);
        pane.appendChild(quizDiv);

        setTimeout(() => {
          const btn = document.getElementById("goto-quiz-" + mod.id);
          if (btn) btn.addEventListener("click", () => quizBtn.click());
        }, 0);

        return pane;
      }

      function buildHome() {
        const pane = document.createElement("div");
        pane.className = "pane active";
        pane.id = "pane-home";
        const grid = document.createElement("div");
        grid.className = "home-grid";
        MODULES.forEach((mod, i) => {
          const card = document.createElement("div");
          card.className = "home-card";
          card.dataset.mid = mod.id;
          card.innerHTML = `<div class="home-card-num">Module ${i + 1}</div>
      <div class="home-card-title">${mod.title}</div>
      <div class="home-card-status">
        <span class="status-dot"></span>
        <span class="status-lbl" style="color:var(--muted)">Not started</span>
      </div>`;
          card.addEventListener("click", () => showTab(mod.id));
          grid.appendChild(card);
        });
        pane.appendChild(grid);
        return pane;
      }

      const nav = document.getElementById("navInner");
      const mainArea = document.getElementById("mainArea");

      const homeBtn = document.createElement("button");
      homeBtn.className = "tab-btn active";
      homeBtn.dataset.mid = "home";
      homeBtn.textContent = "Home";
      homeBtn.addEventListener("click", () => showTab("home"));
      nav.appendChild(homeBtn);
      mainArea.appendChild(buildHome());

      MODULES.forEach((mod, i) => {
        const btn = document.createElement("button");
        btn.className = "tab-btn";
        btn.dataset.mid = mod.id;
        btn.textContent = i + 1 + ". " + mod.title;
        btn.addEventListener("click", () => showTab(mod.id));
        nav.appendChild(btn);
        mainArea.appendChild(buildModulePane(mod));
      });
    </script>
  </body>
</html>
