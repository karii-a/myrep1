<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>IS/IT Study Guide — All Modules + Exams</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0d0f14;
        --surface: #161922;
        --surface2: #1e2230;
        --surface3: #232840;
        --border: #2a2f42;
        --accent: #5b8af0;
        --accent2: #e8a838;
        --accent3: #4ecba0;
        --accent4: #e05c6b;
        --accent5: #b06ef5;
        --text: #dce3f0;
        --muted: #7a85a0;
        --green: #4ecba0;
        --green-bg: rgba(78, 203, 160, 0.12);
        --red: #e05c6b;
        --red-bg: rgba(224, 92, 107, 0.12);
        --amber: #e8a838;
        --amber-bg: rgba(232, 168, 56, 0.12);
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        line-height: 1.7;
        min-height: 100vh;
      }
      a {
        color: var(--accent);
      }

      /* HEADER */
      .site-header {
        text-align: center;
        padding: 3rem 1rem 2rem;
        border-bottom: 1px solid var(--border);
      }
      .site-header h1 {
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -1px;
        margin-bottom: 6px;
      }
      .site-header h1 span {
        color: var(--accent2);
      }
      .site-header p {
        color: var(--muted);
        font-size: 0.95rem;
      }
      .progress-wrap {
        max-width: 320px;
        margin: 1.5rem auto 0;
      }
      .progress-bar {
        background: var(--surface2);
        border-radius: 99px;
        height: 7px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .progress-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--accent), var(--accent3));
        transition: width 0.4s;
      }
      .progress-label {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
        text-align: center;
      }

      /* NAV */
      nav {
        position: sticky;
        top: 0;
        background: rgba(13, 15, 20, 0.97);
      
        border-bottom: 1px solid var(--border);
        z-index: 100;
        overflow-x: auto;
      }
      nav::-webkit-scrollbar {
        display: none;
      }
      .nav-inner {
        display: flex;
        gap: 0;
        min-width: max-content;
        padding: 0 1rem;
      }
      .tab-btn {
        padding: 0 1rem;
        height: 48px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        white-space: nowrap;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .tab-btn:hover {
        color: var(--text);
      }
      .tab-btn.active {
        color: var(--accent);
        border-color: var(--accent);
      }
      .tab-btn.done {
        color: var(--green);
      }
      .tab-btn.done.active {
        color: var(--green);
        border-color: var(--green);
      }

      /* MAIN */
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 2rem 1.25rem 6rem;
      }
      .pane {
        display: none;
      }
      .pane.active {
        display: block;
      }

      /* HOME GRID */
      .home-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        margin-top: 1rem;
      }
      .home-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.1rem 1.3rem;
        cursor: pointer;
        transition:
          border-color 0.2s,
          transform 0.15s;
      }
      .home-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .home-card.done-card {
        border-color: var(--green);
      }
      .home-card-num {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .home-card-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .home-card-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
        transition: background 0.3s;
      }

      /* INNER TABS */
      .inner-tab-row {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }
      .inner-tab {
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        transition: all 0.15s;
      }
      .inner-tab:hover {
        color: var(--text);
        background: var(--surface3);
      }
      .inner-tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* MODULE NOTES */
      .module-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.75rem;
      }
      .module-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .module-sub {
        font-size: 13px;
        color: var(--muted);
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0;
      }

      .sec-head {
        font-size: 15px;
        font-weight: 700;
        margin: 2rem 0 0.9rem;
        color: var(--text);
      }
      .content-p {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.8;
        margin-bottom: 0.8rem;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
        margin: 0.75rem 0 1rem;
      }
      .kcard {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
      }
      .kcard-title {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px;
        color: var(--text);
      }
      .kcard-body {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.65;
      }

      .hl-box {
        border-left: 3px solid var(--accent);
        background: rgba(91, 138, 240, 0.09);
        border-radius: 0 10px 10px 0;
        padding: 0.85rem 1.1rem;
        margin: 1.25rem 0;
        font-size: 13px;
        line-height: 1.75;
        color: var(--text);
      }

      .start-quiz-btn {
        display: block;
        width: 100%;
        margin-top: 2rem;
        padding: 13px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .start-quiz-btn:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }

      /* QUIZ */
      .quiz-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.75rem;
      }
      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .quiz-count {
        font-size: 13px;
        color: var(--muted);
      }
      .quiz-score {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
      }
      .qbar {
        background: var(--surface2);
        border-radius: 99px;
        height: 5px;
        margin-bottom: 1.5rem;
        overflow: hidden;
      }
      .qbar-fill {
        height: 100%;
        border-radius: 99px;
        background: var(--accent);
        transition: width 0.3s;
      }

      .question-text {
        font-size: 17px;
        font-weight: 600;
        line-height: 1.5;
        margin-bottom: 1.25rem;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 1.5rem;
      }
      .opt-btn {
        text-align: left;
        padding: 11px 15px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        font-size: 14px;
        color: var(--text);
        transition: all 0.15s;
        line-height: 1.5;
      }
      .opt-btn:hover:not(:disabled) {
        background: rgba(91, 138, 240, 0.12);
        border-color: var(--accent);
        color: var(--text);
      }
      .opt-btn.correct {
        background: var(--green-bg);
        border-color: var(--green);
        color: var(--green);
        font-weight: 600;
      }
      .opt-btn.wrong {
        background: var(--red-bg);
        border-color: var(--red);
        color: var(--red);
      }
      .opt-btn:disabled {
        cursor: default;
      }

      .feedback-box {
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 1.25rem;
        line-height: 1.7;
        display: none;
      }
      .feedback-box.correct {
        background: var(--green-bg);
        color: var(--green);
        display: block;
      }
      .feedback-box.wrong {
        background: var(--red-bg);
        color: var(--red);
        display: block;
      }

      .btn-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .next-btn {
        padding: 9px 20px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: none;
        transition: opacity 0.2s;
      }
      .next-btn:hover {
        opacity: 0.88;
      }
      .back-btn {
        padding: 9px 14px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .back-btn:hover {
        background: var(--surface2);
      }

      /* RESULTS */
      .results-wrap {
        text-align: center;
        padding: 2rem 1rem 1rem;
      }
      .results-big {
        font-size: 58px;
        font-weight: 800;
        letter-spacing: -3px;
        line-height: 1;
      }
      .results-pct {
        font-size: 14px;
        color: var(--muted);
        margin: 0.4rem 0 1.5rem;
      }
      .results-msg {
        font-size: 14px;
        font-weight: 600;
        display: inline-block;
        padding: 8px 18px;
        border-radius: 8px;
        margin-bottom: 1.5rem;
      }
      .results-btns {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }
      .rbtn {
        padding: 9px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .rbtn:hover {
        opacity: 0.85;
      }
      .rbtn-primary {
        background: var(--accent);
        color: #fff;
        border: none;
      }
      .rbtn-secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }

      /* REVIEW */
      .review-list {
        margin-top: 1.5rem;
      }
      .review-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 0.75rem;
        background: var(--surface);
      }
      .review-q {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .review-correct-ans {
        color: var(--green);
        font-size: 12px;
        margin-bottom: 3px;
      }
      .review-wrong-ans {
        color: var(--red);
        font-size: 12px;
      }
      .review-exp {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <div class="site-header">
      <h1>IS/IT <span>Study Guide</span></h1>
      <p>
        10 modules · Study notes + 8-question quiz per topic · 80 questions
        total
      </p>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="globalBar" style="width: 0%"></div>
        </div>
        <div class="progress-label" id="globalLabel">
          0 of 10 modules completed
        </div>
      </div>
    </div>

    <nav><div class="nav-inner" id="navInner"></div></nav>
    <main id="mainArea"></main>

    <script>
      const MODULES=[
  /* ═══════════════════════════════════════════════ MODULE 1 */
  {
    id:"is-strategy",title:"IS Strategy",
    sub:"IS vs IT · Strategic Objectives · Digital Firm · Constraints",
    content:[
      {type:"hl",text:"<strong>The Car & Road Analogy:</strong> IS = the car (the WHAT — creates value, defines what the business needs). IT = the road (the HOW — infrastructure to deliver it). IS/IT Alignment = the degree to which IS/IT supports actual business goals."},
      {type:"h",text:"Six Strategic IS Objectives"},
      {type:"cards",items:[
        {t:"1. Operational Excellence",b:"Efficiency improvements for higher profitability. E.g. Amazon's automated warehouses optimise delivery routes in real time."},
        {t:"2. New Products & Services",b:"Enabling innovation and market expansion. E.g. Uber's entire service model is built on IS (GPS, mobile app, payments)."},
        {t:"3. Customer & Supplier Intimacy",b:"Serving customers well = returning revenue. E.g. Amazon recommends products based on past purchases."},
        {t:"4. Improved Decision Making",b:"Real data replaces guesswork. E.g. POS sales data tells stores exactly how much stock to order."},
        {t:"5. Competitive Advantage",b:"Better performance or lower cost. E.g. Apple's ecosystem (iPhone + iCloud + App Store) locks customers in."},
        {t:"6. Survival",b:"Technology as necessity. E.g. restaurants that adopted online ordering during COVID survived; those that didn't struggled."},
      ]},
      {type:"h",text:"Four Worldwide Changes Affecting Business"},
      {type:"cards",items:[
        {t:"Global Economy",b:"Markets are no longer local. Companies compete internationally and must coordinate globally."},
        {t:"Industrial Transformation",b:"Shift from manufacturing to information-driven value creation. Knowledge workers and data generate more value."},
        {t:"Business Enterprise",b:"Flatter hierarchies, remote work, digital collaboration, decentralised decision-making."},
        {t:"Digital Firm",b:"Core processes completed digitally, key assets managed digitally. Operates 24/7 across time and space."},
      ]},
      {type:"h",text:"IS Strategy Constraints"},
      {type:"cards",items:[
        {t:"Lack of Awareness",b:"Stakeholders don't understand IS impact — they underinvest or misalign technology with goals."},
        {t:"Credibility Gap",b:"Management doesn't trust that IS delivers what it promises — perceived reliability gap."},
        {t:"Resource Mismanagement",b:"Not treating information as a strategic resource to be actively managed — poor data quality."},
        {t:"Financial Myopia",b:"Demanding immediate ROI on every IS investment — blocking long-term infrastructure that pays off over years."},
        {t:"Short-Term Focus",b:"Prioritising quick wins over strategic architecture — systems become fragmented and impossible to integrate."},
      ]},
    ],
    questions:[
      {q:'What does the "car and road" analogy represent in IS/IT?',opts:["IS = road (infrastructure), IT = car (value)","IS = car (WHAT the business needs), IT = road (HOW to deliver it)","IS and IT are the same concept","IT defines business needs, IS delivers them"],ans:1,exp:"IS (the car) defines WHAT the business needs and creates value. IT (the road) is the infrastructure that delivers it — the HOW."},
      {q:"Which strategic IS objective does Amazon's recommender system best illustrate?",opts:["Operational Excellence","Survival","Customer and Supplier Intimacy","Improved Decision Making"],ans:2,exp:"Using customer data to personalise recommendations improves the customer relationship and drives repeat purchases — Customer and Supplier Intimacy."},
      {q:"A company blocks IS investment because they want immediate financial returns. This is:",opts:["Credibility Gap","Short-Term Focus","Financial Myopia","Lack of Awareness"],ans:2,exp:"Financial Myopia = demanding immediate financial justification for every IS investment, blocking long-term infrastructure."},
      {q:"Which worldwide change describes how companies now have flatter hierarchies and remote work?",opts:["Emergence of the Global Economy","The Emerging Digital Firm","Transformation of the Business Enterprise","Transformation of Industrial Economies"],ans:2,exp:"Transformation of the Business Enterprise describes changes in company structure — flatter hierarchies, remote work, digital collaboration."},
      {q:"IS/IT Alignment refers to:",opts:["Purchasing the latest hardware to match business goals","The degree to which IS/IT supports actual business goals","Installing software that matches IT standards","Aligning employee salaries with IT budgets"],ans:1,exp:"IS/IT Alignment = the degree to which IS/IT understands business goals and uses resources to support them."},
      {q:"A retailer with no online presence loses revenue to digital competitors. This is a symptom of:",opts:["Credibility Gap","Financial Myopia","Missed Opportunities from ineffective IS strategy","Operational Excellence"],ans:2,exp:"Missed Opportunities = business opportunities left unexploited due to system limitations — such as no e-commerce presence."},
      {q:"Projected IoT connected devices by 2026:",opts:["5 billion","10 billion","22 billion","100 billion"],ans:2,exp:"The study material projects approximately 22 billion devices connected through IoT by 2026."},
      {q:"What is an Information System (IS)?",opts:["A network of cables and servers only","Hardware and software only","A collection of hardware, software, data, people and processes producing quality information for decisions","Only the software used by a business"],ans:2,exp:"IS = a collection of hardware, software, data, people and processes that work together to produce quality information for decision-making."},
      {q:"Uber creating a ride-hailing service that didn't exist before using GPS and mobile payments illustrates:",opts:["Survival","Operational Excellence","Customer Intimacy","New Products and Services"],ans:3,exp:"New Products and Services = using IS to enable innovation and create entirely new offerings. Uber's model did not exist before IS made it possible."},
      {q:"Information Technology (IT) is best described as:",opts:["The business logic and process definitions","Hardware, software, networks and databases that make IS possible","The organisational strategy document","The employees who use computers"],ans:1,exp:"IT = the underlying technology infrastructure (hardware, software, networks, operating systems, databases) that makes IS possible."},
      {q:"Which IS objective involves using data analytics to reduce over-ordering?",opts:["New Products and Services","Survival","Improved Decision Making","Competitive Advantage"],ans:2,exp:"Improved Decision Making = using real data to replace guesswork. POS data tells stores exactly how much stock to order — eliminating over/under-ordering."},
      {q:"Apple's ecosystem lock-in (iPhone + iCloud + App Store) is an example of:",opts:["Operational Excellence","Competitive Advantage","New Products and Services","Survival"],ans:1,exp:"Competitive Advantage = IS delivering better performance or lower cost than rivals. Apple's ecosystem creates switching costs that protect market share."},
      {q:"A company with no IS strategy whose priorities keep changing experiences:",opts:["Operational Excellence","Strategic Fit","Constant Shifting Priorities — IS Strategy symptom","Financial Myopia"],ans:2,exp:"Constant Shifting Priorities is a key symptom of ineffective IS strategy — no clear direction causes conflict and chronically poor productivity."},
      {q:"The 'Digital Firm' is characterised by:",opts:["Only using computers for email","Core business processes completed digitally, key assets managed digitally, operating 24/7","Having a website only","Using digital signatures on contracts only"],ans:1,exp:"A Digital Firm has major business relationships enabled digitally, core processes done through digital networks, key assets managed digitally — agile across time and space."},
      {q:"When management doesn't trust that IS delivers value, this constraint is called:",opts:["Financial Myopia","Short-Term Focus","Resource Mismanagement","Credibility Gap"],ans:3,exp:"Credibility Gap = management perceives IS as unreliable or not delivering promised value — reducing investment and support."},
      {q:"Which historical example shows IS creating Competitive Advantage in the 1980s?",opts:["Uber's GPS tracking","Amazon's warehouses","American Airlines placing terminals on travel agents' desks","Netflix streaming"],ans:2,exp:"American Airlines placed proprietary booking terminals on travel agents' desks in the 1980s — agents defaulted to booking American first, creating platform advantage."},
      {q:"Merrill Lynch using mainframe computing to automatically sweep idle cash into money market funds illustrates:",opts:["Survival","New Products and Services","Improved Decision Making","Cost Leadership"],ans:1,exp:"Merrill Lynch used IS to create a new financial product (combined credit, check and investment account) — New Products and Services objective."},
      {q:"IoT devices are characterised by:",opts:["Requiring constant human involvement to operate","Being connected to the internet and able to collect, send and receive data remotely","Only working on private networks","Being limited to smartphones and computers"],ans:1,exp:"IoT devices connect to the internet, collect/send/receive data, and can be controlled remotely without constant human involvement — sensors, RFID tags, smart appliances."},
      {q:"Which IS objective did restaurants use when they adopted online ordering during COVID-19?",opts:["Competitive Advantage","New Products and Services","Survival","Operational Excellence"],ans:2,exp:"Survival = technology as a business necessity due to industry changes or regulations. Restaurants that adopted digital ordering survived; those that didn't, struggled."},
      {q:"'Not treating information as a resource to be actively managed' is which IS constraint?",opts:["Lack of Awareness","Financial Myopia","Resource Mismanagement","Credibility Gap"],ans:2,exp:"Resource Mismanagement = failing to treat information as a strategic asset. Poor data governance, low data quality, and no data strategy follow from this."},
    ]
  },
  /* ═══════════════════════════════════════════════ MODULE 2 */
  {
    id:"porter5",title:"Porter's 5 Forces",
    sub:"Competitive Analysis · Industry Profitability · Strategic Positioning",
    content:[
      {type:"p",text:"Developed in 1979 by Michael Porter (Harvard). Identifies five fundamental pressures that shape a firm's fate and determine an industry's long-term profitability. Goal: find a position that best defends against these forces — or shapes them in your favour."},
      {type:"h",text:"The Five Forces"},
      {type:"cards",items:[
        {t:"1. Competitive Rivalry",b:"Intensity among existing players. High rivalry → price wars, lower margins. Caused by many competitors, slow growth, low differentiation."},
        {t:"2. Threat of New Entrants",b:"How easily new competitors can enter. High barriers (capital, patents, regulations) = low threat. Low barriers = constant challengers."},
        {t:"3. Bargaining Power of Buyers",b:"Powerful buyers force prices down. Power increases with large purchase volumes, undifferentiated products, low switching costs."},
        {t:"4. Bargaining Power of Suppliers",b:"Powerful suppliers raise input prices. Power increases when few alternatives exist, products are differentiated, switching costs are high."},
        {t:"5. Threat of Substitutes",b:"Products from a different industry serving the same need. Netflix substituted cable TV. Substitutes place a ceiling on prices firms can charge."},
      ]},
      {type:"hl",text:"<strong>Economies of Scale:</strong> Fixed cost of $1,000 for 10 units = $100 each. Same $1,000 for 50 units = $20 each. Large incumbents can undercut new entrants on price — this is why economies of scale are a key barrier to entry."},
      {type:"h",text:"Applying the Framework — 4 Steps"},
      {type:"cards",items:[
        {t:"Step 1: Define the Industry",b:'"Smartphones" vs "consumer electronics" yields very different analyses — scope matters.'},
        {t:"Step 2: Analyse the Forces",b:"Identify players, competitors, substitutes, and entry barriers. Gather evidence for each force."},
        {t:"Step 3: Assess Attractiveness",b:"Conclude whether structural profitability is high or low — is this industry worth competing in?"},
        {t:"Step 4: Formulate Strategy",b:"Identify positions where forces are weakest and design your strategy accordingly."},
      ]},
    ],
    questions:[
      {q:"Walmart demands dramatically lower prices from suppliers due to purchase volume. This illustrates:",opts:["High Threat of New Entrants","High Bargaining Power of Buyers","High Competitive Rivalry","High Threat of Substitutes"],ans:1,exp:"Walmart's immense scale = large purchase volumes = high bargaining power over suppliers. This is Bargaining Power of Buyers."},
      {q:"Airlines require billions in capital and government approvals to enter. This represents:",opts:["High Threat of Substitutes","Low Competitive Rivalry","High barriers to entry — Low Threat of New Entrants","High Bargaining Power of Suppliers"],ans:2,exp:"High capital, government approvals, and airport slots = barriers to entry. Therefore the threat of new entrants for airlines is LOW."},
      {q:"Netflix providing an alternative to cable TV is an example of:",opts:["Competitive Rivalry","Threat of Substitutes","Bargaining Power of Buyers","Threat of New Entrants"],ans:1,exp:"Netflix is a substitute — a product from a different industry (streaming) serving the same need (entertainment) as cable TV."},
      {q:"TSMC dominates chip manufacturing with no viable alternative fabs. This gives TSMC:",opts:["High Threat of New Entrants","High Bargaining Power of Suppliers","High Competitive Rivalry","Low Threat of Substitutes"],ans:1,exp:"TSMC's monopoly + high switching costs + no alternatives = extremely high Bargaining Power of Suppliers."},
      {q:"Which condition INCREASES competitive rivalry?",opts:["Strong brand differentiation among competitors","Rapid industry sales growth","Low product differentiation and many competitors","High exit barriers and few competitors"],ans:2,exp:"Low differentiation = companies can't stand out → price competition. Many competitors = everyone fights for the same customers → high rivalry."},
      {q:"Fixed cost of $10,000 spread over 1,000 units instead of 100 cuts per-unit cost from $100 to $10. This is:",opts:["Supplier Power","Economies of Scale","Cost Leadership","Differentiation Advantage"],ans:1,exp:"Economies of Scale = reduction in per-unit cost when production volume increases. Fixed costs are spread over more units."},
      {q:"Porter's 5 Forces was developed to:",opts:["Design a company's marketing strategy","Help firms choose product features","Analyse an industry's competitive environment and profitability potential","Manage employee performance"],ans:2,exp:"Porter's framework provides a comprehensive view of competitive forces — identifying the five fundamental pressures that determine an industry's long-term profitability."},
      {q:"Which is described as 'the central force — the others all feed into it'?",opts:["Threat of New Entrants","Bargaining Power of Suppliers","Threat of Substitutes","Competitive Rivalry"],ans:3,exp:"Competitive Rivalry is the central force — the intensity of competition among existing players shapes profits and is fuelled by the other four forces."},
      {q:"When buyers have FULL INFORMATION about prices across all suppliers, buyer power is:",opts:["Reduced — they don't know what to compare","Increased — they can easily switch to cheaper alternatives","Unchanged — information doesn't affect power","Eliminated — perfect information leads to fair pricing"],ans:1,exp:"Full information increases buyer power because buyers know exactly what competitors charge and can credibly threaten to switch — forcing suppliers to compete on price."},
      {q:"A software app market with no patents, low capital requirements, and a simple app store submission process has:",opts:["Low threat of new entrants","High threat of new entrants","High bargaining power of suppliers","Low competitive rivalry"],ans:1,exp:"Low barriers = weak differentiation, low capital, easy technology access, no patents — anyone can enter. This creates a HIGH threat of new entrants."},
      {q:"High exit barriers (e.g. expensive specialised equipment) tend to:",opts:["Reduce competitive rivalry","Increase competitive rivalry — firms stay and fight even when losing money","Increase the threat of new entrants","Reduce bargaining power of buyers"],ans:1,exp:"High exit barriers trap firms in the industry even when unprofitable — they keep fighting rather than exit, intensifying competitive rivalry."},
      {q:"A substitute product comes from:",opts:["The same industry with a lower price","A completely different industry that satisfies the same customer need","A supplier who sells directly to customers","A competitor offering a near-identical product"],ans:1,exp:"Substitutes come from DIFFERENT industries satisfying the same need. Streaming (different industry from cable) substitutes cable TV."},
      {q:"In Porter's framework, the FIRST step when applying the model is to:",opts:["Assess profitability","Formulate strategy","Define the industry scope and boundaries precisely","Analyse competitive rivalry"],ans:2,exp:"Step 1 = Define the Industry. 'Smartphones' vs 'consumer electronics' yields radically different force analyses — the scope must be set first."},
      {q:"A market with rapid industry sales growth tends to have:",opts:["High competitive rivalry — everyone wants a share","Low competitive rivalry — there's enough growth for everyone","High threat of new entrants","Low bargaining power of buyers"],ans:1,exp:"Rapid growth reduces competitive rivalry — companies can grow without taking share from rivals. Each player has room to expand without head-to-head battles."},
      {q:"Reducing switching costs for customers (e.g. free data migration) would:",opts:["Increase buyer bargaining power","Decrease buyer bargaining power","Increase supplier bargaining power","Decrease threat of substitutes"],ans:0,exp:"Lower switching costs = buyers can more easily move to competitors → their bargaining power INCREASES because the threat to leave is credible."},
      {q:"Which force directly explains why a monopolist can charge premium prices?",opts:["No threat of new entrants","Zero competitive rivalry — no rivals","Both: zero rivalry AND low threat of new entrants","High bargaining power of suppliers"],ans:2,exp:"A monopolist has zero competitive rivalry (no current rivals) and low threat of new entrants (barriers protect the position) — both forces allow premium pricing."},
      {q:"Porter's model is BEST described as a tool for:",opts:["Internal resource auditing","Analysing an industry's external competitive environment","Managing daily operations","Setting employee KPIs"],ans:1,exp:"Porter's 5 Forces analyses the EXTERNAL competitive environment of an industry — the structural forces determining long-term profitability potential."},
      {q:"When supplier products are highly differentiated (no substitutes), supplier power is:",opts:["Low — buyers don't need the product","High — buyers cannot easily switch to an alternative","Neutral — differentiation doesn't affect power","Depends on buyer volume only"],ans:1,exp:"Highly differentiated supplier products with no substitutes = buyer cannot switch → HIGH supplier power to dictate price and terms."},
      {q:"The FINAL step of applying Porter's framework is to:",opts:["Define industry scope","Identify players and substitutes","Assess structural profitability","Formulate strategy based on where forces are weakest"],ans:3,exp:"Step 4 = Formulate Strategy — identify positions where competitive forces are weakest and design a strategy that defends against or shapes those forces."},
      {q:"A pharmaceutical company with 20-year drug patents has what kind of entry barrier?",opts:["High — patents block competitors from copying the product legally","Low — competitors can always develop similar drugs","Medium — patents only last 5 years","None — patents don't apply to pharmaceuticals"],ans:0,exp:"Patents create strong legal barriers to entry — competitors cannot copy the patented formula for up to 20 years, protecting the incumbent's market position."},
    ]
  },
  /* ═══════════════════════════════════════════════ MODULE 3 */
  {
    id:"competitive",title:"Competitive Strategies",
    sub:"Porter's Generic Strategies · SWOT · First Mover Advantage",
    content:[
      {type:"p",text:"Once you understand industry forces, the critical question is: How will you compete? Porter asks two questions: Win on cost or differentiation? Target mass or niche market? The intersection gives four generic strategies."},
      {type:"h",text:"Porter's Four Generic Strategies"},
      {type:"cards",items:[
        {t:"Cost Leadership (Mass + Low Cost)",b:"Serve broad market with lowest production cost. Win by being the undisputed cheapest producer. E.g. Walmart, Xiaomi, Ryanair."},
        {t:"Differentiation Leadership (Mass + Unique)",b:"Offer unique features a broad market pays premium for. Builds loyalty, isolates from rivalry. E.g. Apple, Tesla, Dyson."},
        {t:"Cost Focus (Niche + Low Cost)",b:"Cheapest producer within a specific niche. E.g. corporate bulk tote bags, budget airlines on specific routes."},
        {t:"Differentiation Focus (Niche + Unique)",b:"Uniquely premium within a specific niche. E.g. Rolls Royce, Titleist golf bags, Peloton."},
      ]},
      {type:"h",text:"Three Extended Strategies (Beyond Porter)"},
      {type:"cards",items:[
        {t:"Innovation",b:"Continuously develop new products or business models. Netflix: DVD → streaming → original content — reinventing the model at each stage."},
        {t:"Growth",b:"Expand via organic growth (new markets) or acquisitions. Amazon: books → e-commerce → AWS → logistics → healthcare."},
        {t:"Alliance",b:"Strategic partnerships to access capabilities without full ownership cost. Samsung + Google sharing Android ecosystem."},
      ]},
      {type:"h",text:"SWOT Analysis"},
      {type:"cards",items:[
        {t:"S — Strengths (Internal)",b:"What the company does well. Unique resources, patents, brand loyalty, cost advantages, superior technology."},
        {t:"W — Weaknesses (Internal)",b:"What the company does poorly. Limited capacity, poor IS integration, financial liabilities, lack of skills."},
        {t:"O — Opportunities (External)",b:"Industry trends, new markets, competitor weaknesses, government incentives, new technologies to exploit."},
        {t:"T — Threats (External)",b:"Competitor actions, new disruptors, regulatory changes, supply disruptions, economic shifts."},
      ]},
      {type:"hl",text:"<strong>First Mover Advantage:</strong> Being first captures market share, builds brand loyalty, and establishes barriers before rivals arrive. BUT: competitors can copy at lower cost (free-rider effect), and first movers bear all the R&D risk."},
    ],
    questions:[
      {q:"Walmart competing by having the lowest operational costs across a broad market is:",opts:["Differentiation Focus","Cost Leadership","Cost Focus","Differentiation Leadership"],ans:1,exp:"Cost Leadership = serving a broad market by being the undisputed lowest-cost producer in the industry — exactly Walmart's strategy."},
      {q:"Apple's iPhone offering unique premium features to a wide global market is:",opts:["Cost Leadership","Differentiation Focus","Differentiation Leadership","Cost Focus"],ans:2,exp:"Differentiation Leadership = offering unique, valued features to a broad mass market. Apple targets mainstream consumers worldwide, not a niche."},
      {q:"A company making ultra-premium hand-crafted pens for left-handed professional calligraphers uses:",opts:["Cost Leadership","Differentiation Leadership","Differentiation Focus","Cost Focus"],ans:2,exp:"Differentiation Focus = uniquely premium offering targeted at a specific niche — left-handed professional calligraphers is a very narrow segment."},
      {q:"Netflix evolving from DVD rental to streaming to original content is which extended strategy?",opts:["Alliance","Growth","Cost Leadership","Innovation"],ans:3,exp:"Innovation strategy = continuously developing new products, processes, or business models to stay ahead."},
      {q:"Amazon expanding from books to e-commerce to AWS to healthcare is:",opts:["Differentiation Focus","Alliance","Growth","Innovation"],ans:2,exp:"Growth strategy = expanding market share through organic growth (new markets, new products) or acquisitions."},
      {q:"In SWOT analysis, government incentives for a specific industry are classified as:",opts:["Strength (Internal)","Weakness (Internal)","Opportunity (External)","Threat (External)"],ans:2,exp:"Opportunities are external factors the company could exploit. Government incentives are external environmental factors."},
      {q:'The "free-rider effect" in First Mover Advantage refers to:',opts:["Customers getting products for free","Competitors copying innovations at lower cost than the innovator","First movers getting a free market position","Suppliers reducing prices for early buyers"],ans:1,exp:"Free-rider effect = competitors observe the first mover's innovation, learn from their mistakes, and replicate it at a fraction of the original cost."},
      {q:"Samsung and Google sharing Android platforms represents:",opts:["Growth by acquisition","Innovation through R&D","Alliance strategy","Cost Leadership"],ans:2,exp:"Alliance strategy = strategic partnerships pooling resources to access capabilities, markets, or spread risk without full ownership cost."},
      {q:"Ryanair charging the lowest fares possible for flights across a mass market is:",opts:["Differentiation Focus","Cost Focus","Cost Leadership","Differentiation Leadership"],ans:2,exp:"Cost Leadership = lowest cost producer targeting a broad/mass market. Ryanair strips all extras to minimise cost and pass savings to a wide audience."},
      {q:"Rolls-Royce selling ultra-luxury cars only to wealthy niche buyers is:",opts:["Cost Leadership","Differentiation Leadership","Cost Focus","Differentiation Focus"],ans:3,exp:"Differentiation Focus = uniquely premium product targeting a very narrow niche (ultra-wealthy). Premium features matter far more than price."},
      {q:"In SWOT, poor IS system integration and limited technical capacity are:",opts:["Strengths","Weaknesses","Opportunities","Threats"],ans:1,exp:"Weaknesses are INTERNAL factors the company does poorly — limited capacity, poor IS integration, and financial liabilities are classic weaknesses."},
      {q:"Coca-Cola being first to establish a global cola brand in 1886 illustrates:",opts:["Alliance Strategy","Cost Leadership","First Mover Advantage","Differentiation Focus"],ans:2,exp:"First Mover Advantage = Coca-Cola was first to market, built brand loyalty and distribution over decades, making it nearly impossible for new entrants to dislodge."},
      {q:"A new competitor enters the smartphone market with features that match Apple's at half the price. This is a threat to Apple's:",opts:["Cost Leadership strategy","Differentiation Leadership strategy","Alliance strategy","Growth strategy"],ans:1,exp:"Apple uses Differentiation Leadership — a competitor matching its features at lower cost directly threatens the premium pricing justification of this strategy."},
      {q:"Which SWOT element would include 'a new e-commerce boom in Southeast Asia'?",opts:["Strength","Weakness","Opportunity","Threat"],ans:2,exp:"An e-commerce boom in a new region = external trend the company could exploit = Opportunity (External, Positive)."},
      {q:"A budget airline offering the cheapest fares only on the London-Paris route (not all routes) is:",opts:["Cost Leadership","Cost Focus","Differentiation Focus","Differentiation Leadership"],ans:1,exp:"Cost Focus = lowest-cost producer targeting a SPECIFIC NICHE (one specific route). Unlike Cost Leadership which targets the broad market."},
      {q:"First Mover disadvantage includes:",opts:["Building brand loyalty early","Controlling scarce assets","Bearing all R&D risk and uncertainty","Establishing barriers before rivals"],ans:2,exp:"First Mover DISADVANTAGE = bearing all R&D risk and uncertainty. If the market doesn't respond, there's no one else's mistake to learn from."},
      {q:"A company acquires a competitor to double its market share. This is:",opts:["Alliance Strategy","Innovation Strategy","Growth Strategy (inorganic)","Differentiation Leadership"],ans:2,exp:"Growth Strategy via INORGANIC means = acquiring competitors or related businesses to gain market share rapidly."},
      {q:"Which Porter Generic Strategy is most vulnerable to a competitor offering the same uniqueness at lower cost?",opts:["Cost Leadership","Cost Focus","Differentiation Leadership","Differentiation Focus"],ans:2,exp:"Differentiation Leadership is vulnerable if a competitor matches the unique features at a lower price — the premium price justification disappears."},
      {q:"Nepal's Chaudhary Group expanding from Wai Wai noodles into banking and telecom illustrates:",opts:["Alliance","Innovation","Differentiation Focus","Growth"],ans:3,exp:"Growth Strategy = expanding market share by entering adjacent markets. CG grew organically from food into diverse industries including banking and telecom."},
      {q:"SWOT analysis is most useful when:",opts:["Making operational daily decisions","Evaluating internal and external factors to inform strategic decision-making","Setting employee bonuses","Designing product features only"],ans:1,exp:"SWOT = evaluates internal Strengths/Weaknesses and external Opportunities/Threats to inform strategic direction. It's a strategic planning tool, not operational."},
    ]
  },
  /* ═══════════════════════════════════════════════ MODULE 4 */
  {
    id:"scm1",title:"Supply Chain I",
    sub:"SC Definition · Objectives · Uncertainty · Enablers · ESG",
    content:[
      {type:"p",text:"A supply chain is the entire network of individuals, organisations, resources, activities and technology involved in the creation and sale of a product — from raw materials to end customer."},
      {type:"h",text:"Three Tiers of a Supply Chain"},
      {type:"cards",items:[
        {t:"Tier 1 (Closest to Customer)",b:"Direct suppliers and retailers who interact most closely with the end consumer. E.g. garment assembly factory and the retail store."},
        {t:"Tier 2 (Components)",b:"Suppliers to Tier 1 — they make components used in assembly. E.g. textile mill that makes denim fabric from cotton."},
        {t:"Tier 3 (Raw Materials)",b:"Furthest upstream — source of raw materials. E.g. cotton farms in the US and India, indigo dye producers."},
      ]},
      {type:"h",text:"Four Keys to Effective SCM"},
      {type:"cards",items:[
        {t:"Information",b:"What and how much to produce. Without accurate data, companies over- or under-produce — both are expensive."},
        {t:"Cooperation",b:"Working toward a common goal — aligning production schedules and sharing risk. A chain is only as strong as its weakest link."},
        {t:"Communication",b:"Right information to the right party at the right time to prevent costly disruptions."},
        {t:"Trust",b:"Without trust, every transaction requires verification — dramatically increasing cost and slowing response."},
      ]},
      {type:"hl",text:"<strong>Customer = the only real cash source.</strong> Every payment between SC partners is redistribution of the same money. SC Value = Customer payment − Total costs across ALL stages."},
      {type:"h",text:"SC Enablers — Technologies"},
      {type:"cards",items:[
        {t:"EDI (Electronic Data Interchange)",b:"Moving from paper documents to standardised electronic orders, invoices, and shipping notices."},
        {t:"RFID",b:"Radio Frequency Identification — tracks objects with radio waves, no line-of-sight needed. More powerful than barcodes."},
        {t:"Barcodes & POS",b:"Point-of-sale scanning triggers immediate upstream signals automatically when a product sells."},
        {t:"AI",b:"Predictive demand forecasting, route optimisation, anomaly detection. E.g. Amazon's anticipatory shipping."},
      ]},
    ],
    questions:[
      {q:"Cotton farms sit at which tier in the jeans supply chain?",opts:["Tier 1 — closest to customer","Tier 2 — component level","Tier 3 — raw materials","No specific tier"],ans:2,exp:"Tier 3 = furthest upstream, raw materials. Cotton farms provide the raw material that starts the entire chain."},
      {q:"The end customer is described in SCM as:",opts:["The most expensive part of the chain","The only source of real cash entering the supply chain","The least important participant","A passive receiver of goods"],ans:1,exp:"The end customer is the ONLY source of actual new cash. All inter-partner payments simply redistribute that same pool of money."},
      {q:"Safety Stock is best described as:",opts:["Stock that is unsafe to sell","Extra inventory kept as insurance against stockouts","Stock reserved for VIP customers","Emergency materials stored at Tier 3"],ans:1,exp:"Safety Stock = extra buffer inventory kept to prevent stockouts. Expensive — ties up cash and requires warehouse space."},
      {q:"RFID differs from barcodes because RFID:",opts:["Only works with liquids","Requires no power source","Uses radio waves requiring no line-of-sight scanning","Is older technology than barcodes"],ans:2,exp:"RFID uses radio frequency identification — tracks objects without requiring a direct line-of-sight scan, making it more versatile than barcodes."},
      {q:"Which of the four SCM keys ensures all partners work toward a shared goal?",opts:["Communication","Information","Trust","Cooperation"],ans:3,exp:"Cooperation = working together toward a common goal — aligning schedules, sharing risk, and helping partners improve processes."},
      {q:"EDI primarily replaces:",opts:["RFID systems","Physical warehouses","Paper-based documents like orders and invoices","Customer loyalty programmes"],ans:2,exp:"EDI = moving from paper-based documents (purchase orders, invoices, shipping notices) to standardised electronic documents."},
      {q:"Supply Chain Value is:",opts:["Revenue minus operating expenses","Customer payment minus total costs across all stages","Profit of the manufacturer only","Total revenue of all partners combined"],ans:1,exp:"SC Value = what the customer pays − total costs across ALL stages. High value = efficient chain where maximum surplus is retained."},
      {q:"Which ESG pillar covers verifying fair labour practices across all supplier tiers?",opts:["Environmental","Governance","Social","Financial"],ans:2,exp:"Social ESG = fair labour practices across the entire supply chain — not just internally, but verifying conditions at all supplier tiers."},
      {q:"A garment assembly factory is classified in the supply chain as:",opts:["Tier 3 — raw materials","Tier 2 — components","Tier 1 — closest to customer","Outside the supply chain"],ans:2,exp:"Assembly factories are Tier 1 — they interact most closely with the retail customer and directly supply finished products."},
      {q:"Without TRUST in a supply chain, what happens?",opts:["Partners share more data","Every transaction requires expensive verification, slowing response","Costs decrease due to more careful checking","Lead times shorten"],ans:1,exp:"Without trust, every transaction requires independent verification — legal checks, audits, inspections — dramatically increasing cost and slowing the entire chain."},
      {q:"Which SCM key ensures the RIGHT information reaches the RIGHT party at the RIGHT time?",opts:["Cooperation","Trust","Communication","Information"],ans:2,exp:"Communication = ensuring the right information flows to the right supply chain partner at the right time — preventing costly misalignments and disruptions."},
      {q:"Inaccurate demand forecasting leads to:",opts:["Perfect inventory levels","Either costly overstock or lost sales from understock — both expensive","Lower safety stock requirements","Better supplier relationships"],ans:1,exp:"Inaccurate forecasting = either overproduction (wastes cash on storage/markdowns) or underproduction (loses customers). Both outcomes are expensive."},
      {q:"The 'Information' key in SCM is most directly about:",opts:["Having fast internet connections","Knowing what and how much to produce based on accurate data","Sharing social media updates","Sending emails quickly"],ans:1,exp:"Information = having accurate, real-time data about inventory levels, customer orders, and delivery status to know what and how much to produce."},
      {q:"A supply chain where the shipping department saves money with a slow boat but the retail store runs out of stock has:",opts:["Achieved good total SC profitability","Failed at total SC profitability — optimising one stage harmed the whole","Achieved Cost Leadership","Demonstrated good cooperation"],ans:1,exp:"Total SC Profitability = you can't judge by one stage. If slow shipping causes stockouts that lose customers, the total chain has failed even if shipping saved money."},
      {q:"AI in supply chain management is primarily used for:",opts:["Replacing all human workers","Predictive demand forecasting, route optimisation, and anomaly detection","Social media management","Customer relationship management only"],ans:1,exp:"AI enables predictive demand forecasting (anticipating needs before orders), route optimisation (cheapest/fastest delivery paths), and anomaly detection (spotting disruptions early)."},
      {q:"A textile mill that converts raw cotton into denim fabric sits at:",opts:["Tier 1","Tier 2","Tier 3","Outside the chain"],ans:1,exp:"Tier 2 = component-level suppliers — they take raw materials and create components (denim fabric) used by Tier 1 assembly factories."},
      {q:"Which SC enabler technology allows inventory tracking without scanning each item individually?",opts:["EDI","Barcodes","POS systems","RFID"],ans:3,exp:"RFID can track multiple items simultaneously without line-of-sight — unlike barcodes which must be scanned individually. Great for warehouse inventory counts."},
      {q:"The SCM objective 'Maximize Overall Value Generated' means:",opts:["Maximise manufacturer profits only","Difference between what customer pays and total costs across all stages — high value = efficient chain","Set the highest possible prices","Minimise supplier payments"],ans:1,exp:"SC Value = customer payment − all costs across ALL stages. A highly efficient chain creates a large surplus by minimising total costs while delivering what customers value."},
      {q:"Variable lead times (e.g. '5 to 10 days') cause problems because:",opts:["They are too short for production planning","The uncertainty makes precise production scheduling impossible","Suppliers prefer longer lead times","They increase customer satisfaction"],ans:1,exp:"Variable lead times create uncertainty — you don't know exactly when materials arrive, making it impossible to schedule production precisely without holding expensive safety stock."},
      {q:"ESG Governance in supply chain management includes:",opts:["Carbon footprint measurement","Fair labour practices verification","Ethical conduct, anti-corruption measures, and compliance with laws","Reducing packaging waste"],ans:2,exp:"Governance ESG = ethical conduct, anti-corruption measures, compliance with laws and regulations, and transparent supplier auditing across the chain."},
    ]
  },
  /* ═══════════════════════════════════════════════ MODULE 5 */
  {
    id:"global",title:"Global Systems",
    sub:"Globalization · Org Structures · Global Strategies · Business Intelligence",
    content:[
      {type:"p",text:"Globalization is the process by which businesses develop international influence or operate on an international scale. Advances in transportation, telecommunications, and the Internet drive further economic and cultural interdependence."},
      {type:"h",text:"Three Organisational Structures"},
      {type:"cards",items:[
        {t:"Centralized (Global)",b:'HQ dictates everything. Identical product worldwide. One global system. "One size fits all." E.g. Intel CPUs — same chip globally.'},
        {t:"Decentralized (Multidomestic)",b:'HQ is financial investor only. Unique products per country. Local systems. "Think local, act local." E.g. Nestlé with local recipes.'},
        {t:"Coordinated (Transnational)",b:'HQ collaborates and guides. Core design + local tweaks. Shared systems. "Think global, act local." E.g. Starbucks, KFC.'},
      ]},
      {type:"h",text:"Four Global Business Strategies"},
      {type:"cards",items:[
        {t:"Domestic Exporter",b:"Heavy centralisation — all activities focused in home country. Products made at home, shipped abroad with minimal adaptation."},
        {t:"Multinational",b:"Financial management dispersed to local units. Each country adapts products, marketing, and strategy to local conditions."},
        {t:"Franchiser",b:"Business model created at home, copied exactly abroad. Same core product, local operators. E.g. KFC, McDonald's."},
        {t:"Transnational",b:"All units participate as equals in a value-adding partnership. Shared resources flow across the whole network. E.g. Ford/GM shared engines."},
      ]},
      {type:"h",text:"Business Intelligence (BI)"},
      {type:"cards",items:[
        {t:"Reporting",b:"Filtering and sorting data into formatted summaries — e.g. monthly CFO report showing EU vs Asia sales by category."},
        {t:"Data Mining",b:"Complex statistical algorithms finding hidden patterns — e.g. coffee buyers are 40% more likely to also buy biscuits."},
        {t:"Knowledge Management",b:"Creating value from intellectual property by sharing knowledge — e.g. internal engineering Wiki across countries."},
        {t:"Expert Systems",b:"Knowledge Base + Inference Engine assists decisions — e.g. medical diagnostic tool suggesting illness from symptoms."},
      ]},
      {type:"hl",text:'<strong>Cooptation:</strong> Strategy for managing resistance to global IS rollouts — bring the opposition into the design process without giving up control. E.g. the manager who hates the new HR system becomes "Lead Consultant for European Rollout" — feels empowered, central team keeps control.'},
    ],
    questions:[
      {q:"KFC opening franchises internationally with identical menus and processes is which global strategy?",opts:["Domestic Exporter","Multinational","Franchiser","Transnational"],ans:2,exp:"Franchiser = business models created at home copied exactly in foreign locations. Core product/process standardised, delivery is local."},
      {q:"Nestlé creating different recipes for different country markets represents:",opts:['Centralized — "One size fits all"','Decentralized (Multidomestic) — "Think local, act local"','Coordinated (Transnational) — "Think global, act local"',"Domestic Exporter"],ans:1,exp:"Decentralized/Multidomestic = HQ acts only as financial investor while each local unit adapts products to local conditions."},
      {q:"Ford and GM developing standardised shared engines collaboratively across countries is:",opts:["Domestic Exporter","Multinational","Franchiser","Transnational"],ans:3,exp:"Transnational = all units participate as equals in a value-adding partnership — resources, knowledge, and capabilities flow across the whole network."},
      {q:"An algorithm discovering coffee buyers are 40% more likely to buy biscuits is:",opts:["Knowledge Management","Expert Systems","Reporting","Data Mining"],ans:3,exp:"Data Mining = software searching through data using complex statistical calculations to find hidden trends, patterns, and correlations."},
      {q:"An internal Wiki where Singapore engineers share solutions for Mexico engineers to use is:",opts:["Reporting","Data Mining","Knowledge Management","Expert Systems"],ans:2,exp:"Knowledge Management = creating value from intellectual property by sharing organisational knowledge across borders."},
      {q:"Software Localisation means:",opts:["Installing software in multiple locations","Converting software to operate effectively in a second language or local context","Backing up software locally","Reducing software licence costs locally"],ans:1,exp:"Software Localisation = converting software to operate in a second language/context — adapting to local laws, tax codes, currency, and cultural norms."},
      {q:'"Cooptation" for managing resistance to global IS rollouts means:',opts:["Forcing adoption through performance reviews","Bringing the opposition into the design process without giving up control","Compensating resistant employees with higher pay","Outsourcing the system to a third party"],ans:1,exp:"Cooptation = bringing resistors into the process (making them feel empowered) while maintaining central control over direction."},
      {q:"Which system configuration has each foreign unit designing its own solutions entirely?",opts:["Centralized","Duplicated","Decentralized","Networked"],ans:2,exp:"Decentralized configuration = each foreign unit designs its own systems entirely. Maximum local fit, minimum standardisation."},
      {q:"Intel CPU chips being identical worldwide regardless of country is an example of which organisational structure?",opts:["Decentralized","Coordinated (Transnational)","Centralized (Global)","Franchiser"],ans:2,exp:"Centralized structure = HQ dictates everything. One product, one system, identical worldwide. 'One size fits all.'"},
      {q:"A medical diagnostic tool that asks questions and suggests likely illnesses using a rule database is:",opts:["Reporting","Data Mining","Knowledge Management","Expert Systems"],ans:3,exp:"Expert Systems = Knowledge Base + Inference Engine simulating expert decision-making. The system 'thinks' like a doctor using stored medical rules."},
      {q:"The 'Networked' system configuration is best suited for which global strategy?",opts:["Domestic Exporter","Multinational","Franchiser","Transnational"],ans:3,exp:"Networked configuration = development and operations coordinated across ALL units. Perfectly aligns with Transnational strategy where all units are equal partners."},
      {q:"Which global IS challenge involves different countries having VAT vs Sales Tax requiring flexible system design?",opts:["Agreeing on common user requirements","Coordinating software releases","Introducing changes in business processes","Encouraging local users to support global systems"],ans:2,exp:"Changing Business Processes = creating core global processes while allowing local flexibility (e.g. tax field adapts per country) addresses legal/regulatory differences."},
      {q:"A company with all operations in its home country that ships products to foreign markets is a:",opts:["Multinational","Franchiser","Transnational","Domestic Exporter"],ans:3,exp:"Domestic Exporter = heavily centralised, all corporate activities focused in home country, simply shipping products to foreign markets with minimal adaptation."},
      {q:"Reporting as a BI category involves:",opts:["Finding hidden statistical patterns in data","Creating formatted summaries for decision-makers by filtering and sorting data","Sharing organisational knowledge","Replicating expert decision-making"],ans:1,exp:"Reporting = processing data via filtering and sorting into formatted summaries (tables, charts) that inform executive decision-making — like a monthly sales dashboard."},
      {q:"The Nepal office being on software v2.0 while the US office is on v1.5 (incompatible) is which global IS challenge?",opts:["Agreeing on common user requirements","Coordinating software releases across all global units simultaneously","Changing business processes","Software localisation"],ans:1,exp:"Coordinating Software Releases = all global units must update simultaneously. Version incompatibility blocks collaboration and data sharing across offices."},
      {q:"VPNs (Virtual Private Networks) address which global IT challenge?",opts:["Computing platform standardisation","Connectivity — public internet doesn't guarantee service levels","Software localisation","Legacy system integration"],ans:1,exp:"VPNs address Connectivity challenges — the public internet doesn't guarantee uptime or security. VPNs provide private, secure, reliable connections across global offices."},
      {q:"A company where HQ guides strategy but all units co-develop products with local tweaks uses which structure?",opts:["Centralized","Decentralized","Coordinated (Transnational)","Domestic Exporter"],ans:2,exp:"Coordinated/Transnational structure = HQ collaborates and guides; units share core design and adapt locally. 'Think global, act local.'"},
      {q:"Globalisation is primarily driven by advances in:",opts:["Manufacturing automation only","Transportation, telecommunications, and the Internet","Government trade policies only","Currency exchange mechanisms"],ans:1,exp:"Globalisation = driven by advances in transportation (physical goods), telecommunications (communication), and the Internet (data/commerce) — generating economic and cultural interdependence."},
      {q:"A multinational company developing a 'Lite' software version for low-bandwidth regions is addressing ESG's:",opts:["Environmental pillar","Governance pillar","Social pillar — ensuring technology is accessible to all regardless of location","Financial efficiency"],ans:2,exp:"Social ESG = ensuring technology is usable by everyone regardless of physical ability or geographic location. Lite software for remote areas with poor internet access."},
      {q:"Data Marts in Business Intelligence are:",opts:["Full data warehouses","Mini-warehouses containing a subset of data focused on a specific department","External customer databases","Physical storage rooms for company servers"],ans:1,exp:"Data Marts = mini-warehouses containing a focused subset of data for a specific department. E.g. Marketing's Data Mart only contains social media and ad spend data."},
    ]
  },
  /* ═══════════════════════════════════════════════ MODULE 6 */
  {
    id:"bullwhip",title:"Bullwhip Effect",
    sub:"SC Coordination Failure · Causes · Cascading Impact · Solutions",
    content:[
      {type:"p",text:"The Bullwhip Effect is where small, stable changes in customer demand at retail get progressively amplified upstream — retailer → wholesaler → distributor → manufacturer — resulting in massive, wasteful production swings despite calm end-consumer demand."},
      {type:"hl",text:"<strong>The Analogy:</strong> A tiny flick of your wrist (handle = consumer demand) creates a violent snap at the tip (factory). 5% more pasta bought by consumers → manufacturer ramps production up 40%."},
      {type:"h",text:"Root Causes"},
      {type:"cards",items:[
        {t:"Order Batching",b:"Weekly/monthly bulk orders create artificial demand spikes not reflecting real continuous consumption."},
        {t:"Demand Forecasting Errors",b:"Each link adds its own safety buffer on top of the last layer's inflated estimate — errors compound exponentially upstream."},
        {t:"Price Fluctuations",b:"Promotions trigger forward buying — customers bulk-buy during sales, inflating demand signals that cause overproduction."},
        {t:"Shortage Gaming",b:"When products are scarce, buyers over-order. When the shortage ends, they cancel — creating a sudden crash in apparent demand."},
      ]},
      {type:"h",text:"Solutions"},
      {type:"cards",items:[
        {t:"POS Data Sharing (Demand Visibility)",b:"Share real point-of-sale data with ALL upstream partners so everyone reacts to actual consumer demand."},
        {t:"Vendor-Managed Inventory (VMI)",b:"Supplier monitors your inventory and ships automatically when thresholds are reached — cuts out order distortion."},
        {t:"CPFR",b:"Collaborative Planning, Forecasting & Replenishment — all partners build and work from one shared forecast."},
        {t:"Smaller More Frequent Orders",b:"Weekly instead of monthly orders reflects real consumption patterns far more accurately."},
        {t:"Stable Pricing / EDLP",b:"Everyday Low Pricing removes the incentive to stockpile during sales — eliminating forward buying."},
      ]},
    ],
    questions:[
      {q:"A 5% consumer demand increase causes a 40% production ramp at the manufacturer. This is:",opts:["Supply Chain Disruption","The Bullwhip Effect","Demand Amplification Syndrome","Forward Buying"],ans:1,exp:"The Bullwhip Effect = small changes in end-consumer demand get progressively amplified at each upstream stage — massive production swings despite calm consumer demand."},
      {q:"Customers bulk-buying pasta during a promotional sale creating upstream demand spikes is:",opts:["Order Batching","Shortage Gaming","Price Fluctuations causing Forward Buying","Demand Forecasting Errors"],ans:2,exp:"Price Fluctuations (promotions) encourage forward buying — customers buy in bulk during sales, sending inflated demand signals upstream."},
      {q:"A retailer placing one large monthly order instead of smaller weekly orders contributes to the Bullwhip Effect via:",opts:["Shortage Gaming","Price Fluctuations","Order Batching","Lead Time Variability"],ans:2,exp:"Order Batching = placing large periodic orders instead of smaller frequent ones. Creates artificial demand spikes not reflecting real consumption."},
      {q:"Kimberly-Clark and Walmart sharing live POS diaper sales data is a solution called:",opts:["Vendor-Managed Inventory","CPFR","Point-of-Sale Data Sharing (Demand Visibility)","Order Batching Reduction"],ans:2,exp:"POS Data Sharing = sharing real point-of-sale data with all upstream partners so everyone reacts to actual consumer demand, not distorted orders."},
      {q:"Vendor-Managed Inventory (VMI) means:",opts:["The vendor tracks competitor inventory","The supplier manages replenishment directly based on real inventory data","Customers manage their own storage","The manufacturer sets retail prices"],ans:1,exp:"VMI = the supplier monitors your inventory levels and ships automatically when thresholds are reached — cutting out the distortion from buyer ordering decisions."},
      {q:"Which metric DECREASES as a result of the Bullwhip Effect?",opts:["Manufacturing cost","Inventory cost","Replenishment lead time","Level of product availability"],ans:3,exp:"Product availability DECREASES despite overproduction elsewhere — stockouts occur because goods are in the wrong place or demand swings create supply gaps."},
      {q:"CPFR stands for:",opts:["Combined Procurement and Forecasting Review","Collaborative Planning, Forecasting and Replenishment","Customer-Partnered Fulfilment and Replenishment","Central Production Flow and Reporting"],ans:1,exp:"CPFR = Collaborative Planning, Forecasting and Replenishment — two or more supply chain companies synchronising demand forecasts into one shared plan."},
      {q:"Everyday Low Pricing (EDLP) reduces the Bullwhip Effect by:",opts:["Reducing the number of SKUs","Eliminating forward buying incentives that cause artificial demand spikes","Lowering transportation costs","Reducing the number of supply chain tiers"],ans:1,exp:"EDLP removes promotional sales that trigger bulk buying. Stable prices mean customers buy consistently rather than stockpiling during sales."},
      {q:"The Bullwhip Effect gets its name because:",opts:["It involves physical whipping of inventory","A tiny handle movement (consumer demand) creates a violent tip snap (factory ramp) — small input, huge amplified output","It was discovered by a whip manufacturer","It only occurs in agricultural supply chains"],ans:1,exp:"Like cracking a whip — a small wrist flick (consumer demand change) creates a violent snap at the tip (factory). Small retail change = massive manufacturer swing."},
      {q:"'Shortage Gaming' occurs when:",opts:["Games become scarce before Christmas","Buyers over-order to guarantee supply when products are scarce, then cancel when the shortage ends","Manufacturers deliberately create artificial scarcity","Retailers hoard products to drive up prices"],ans:1,exp:"Shortage Gaming = buyers over-order during scarcity to guarantee supply, then cancel when the shortage ends — creating a phantom demand spike followed by a sudden crash."},
      {q:"The Bullwhip Effect's root cause of 'Demand Forecasting Errors' refers to:",opts:["One wrong forecast at the factory","Each supply chain link adding its own safety buffer, compounding errors exponentially upstream","Customers lying about their actual needs","Retailers intentionally inflating forecasts"],ans:1,exp:"Each link adds its own buffer on top of the previous link's already-inflated estimate — errors don't just add, they COMPOUND exponentially as you move upstream."},
      {q:"Which Bullwhip solution involves changing HOW OFTEN orders are placed (not how many)?",opts:["CPFR","POS Data Sharing","Smaller More Frequent Orders","Stable Pricing"],ans:2,exp:"Smaller More Frequent Orders = placing orders weekly instead of monthly. More frequent ordering reflects real consumption patterns and prevents artificial demand spikes from batching."},
      {q:"Total SC Profit = Customer revenue − total costs. The Bullwhip Effect harms this by:",opts:["Increasing customer revenues","Inflating costs (excess inventory, overtime, waste) while potentially losing sales","Reducing customer demand","Lowering transportation costs"],ans:1,exp:"Bullwhip inflates costs across the chain (inventory, storage, markdowns, overtime ramp-up then idle costs) — severely damaging total SC profitability even when individual stages seem fine."},
      {q:"CPFR's main benefit over traditional forecasting is:",opts:["It uses AI instead of humans","Multiple supply chain partners synchronise into ONE shared forecast — eliminating conflicting assumptions","It is cheaper","It requires less data"],ans:1,exp:"CPFR = collaborative synchronisation of all partners into one shared forecast. Eliminates the conflicting, independently-inflated estimates that cause the bullwhip."},
      {q:"Which cost INCREASES as a direct result of Bullwhip Effect coordination failure?",opts:["Customer satisfaction","Product availability","Transportation cost","Market share"],ans:2,exp:"Transportation cost INCREASES — emergency shipments, expedited freight, and inefficient routing all rise when the chain is reacting to distorted demand signals."},
      {q:"A company switches from monthly bulk purchasing to daily reordering based on actual sales. This primarily addresses which root cause?",opts:["Shortage Gaming","Price Fluctuations","Order Batching","Demand Forecasting Errors"],ans:2,exp:"Daily reordering based on actual sales = directly eliminates Order Batching. Smaller, more frequent orders prevent the artificial demand spikes that batch orders create."},
      {q:"In the classic Bullwhip example, a 5% consumer increase becomes what at the manufacturer?",opts:["5% increase","10% increase","20% increase","40% increase"],ans:3,exp:"Classic example: 5% consumer → 10% retailer → 20% wholesaler → 40% manufacturer. Each link adds a safety buffer, compounding the original signal dramatically."},
      {q:"Sharing POS data with ALL upstream partners solves the Bullwhip Effect because:",opts:["It eliminates safety stock entirely","Everyone reacts to actual consumer demand rather than each other's distorted orders","It replaces the need for suppliers","It automatically sets production schedules"],ans:1,exp:"POS Data Sharing = all partners see the same real consumer demand data — no one needs to guess or add buffers based on distorted order signals from the next tier."},
      {q:"Which statement about the Bullwhip Effect is TRUE?",opts:["It only affects the retail stage","Replenishment lead time DECREASES due to urgency","Manufacturing cost INCREASES due to inefficient production swings","Product availability INCREASES due to extra inventory"],ans:2,exp:"Manufacturing cost INCREASES — expensive overtime ramp-ups, then idle capacity, then emergency restarts. All caused by massive production swings from a small original demand change."},
      {q:"VMI (Vendor-Managed Inventory) is most effective because it:",opts:["Transfers inventory ownership to the customer","Removes the distortion of buyer-placed orders by having the supplier replenish based on actual stock levels","Forces customers to pay upfront","Eliminates the need for safety stock entirely"],ans:1,exp:"VMI removes buyer-placed order distortion — the supplier sees real inventory and replenishes it directly, bypassing the 'order inflation' behaviour of buyers adding safety buffers."},
    ]
  },
