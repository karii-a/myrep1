  {
    id:"scm2",title:"Supply Chain II",
    sub:"Strategic Fit · CPFR · Transportation · Sourcing · Global Risk",
    content:[
      {type:"hl",text:"<strong>Strategic Fit:</strong> When Competitive Strategy and Supply Chain Strategy have aligned goals. Amazon's competitive strategy (fast, affordable delivery) + supply chain strategy (massive warehouses, own logistics, same-day delivery) = perfect strategic fit. A company fails when its processes don't match its promises."},
      {type:"h",text:"Transportation Modes Compared"},
      {type:"cards",items:[
        {t:"Rail",b:"Best for bulk goods and raw materials. Low cost for large volumes. Slow and inflexible; not economical for small loads."},
        {t:"Trucking",b:"Small loads, point-to-point, last-mile delivery. Flexible routes. More expensive than rail for long distances."},
        {t:"Air",b:"High-value, perishable, urgent goods. Fastest mode, global reach. Most expensive by far."},
        {t:"Sea / Water",b:"International bulk shipping. Lowest cost per unit, massive capacity. Slowest mode; weather and port dependency."},
        {t:"Pipeline",b:"Oil, gas, liquids only. Low operating cost, long life. High capital cost, fixed routes."},
        {t:"Intermodal",b:"Combines sea/rail efficiency with truck flexibility for last-mile. Complex coordination but balances cost and reach."},
      ]},
      {type:"h",text:"Top Global SC Risk Factors"},
      {type:"cards",items:[
        {t:"#1 — 38%: SC Partner Performance",b:"Partners failing to deliver on time or quality — most frequent global SC risk."},
        {t:"#2 — 37%: Fuel Price Volatility",b:"Sudden fuel cost changes make logistics budgeting extremely difficult."},
        {t:"#3 — 35%: Natural Disasters",b:"Earthquakes, floods, and extreme weather disrupting production and logistics."},
        {t:"Risk Mitigation",b:"Redundant suppliers · Increased capacity · Favour responsiveness for short-lifecycle products."},
      ]},
    ],
    questions:[
      {q:'A company promises "fastest delivery" but runs a slow, cost-focused supply chain. This is a failure of:',opts:["Vendor-Managed Inventory","Strategic Fit","CPFR","Outsourcing decisions"],ans:1,exp:"Strategic Fit = when Competitive Strategy and Supply Chain Strategy have aligned goals. Promising fast delivery but running a slow chain = strategic misfit."},
      {q:"The most expensive transport mode, best for high-value or urgent goods, is:",opts:["Rail","Trucking","Air","Sea/Water"],ans:2,exp:"Air freight = fastest mode with global reach, but by far the most expensive. Used for high-value, perishable, or time-critical goods."},
      {q:"The lowest cost per unit transport mode for international bulk shipping is:",opts:["Air","Trucking","Rail","Sea/Water"],ans:3,exp:"Sea/Water = lowest cost per unit and massive capacity — dominant for international bulk trade, despite being the slowest mode."},
      {q:"A company keeps its proprietary recipe development in-house but outsources cleaning services. This reflects:",opts:["Poor strategic planning","Core competency protection — keep in-house what defines competitive advantage","Economies of scale in cleaning","Global SC risk mitigation"],ans:1,exp:"In-house = choose when the activity is a core competency defining your competitive advantage. Recipes are core; cleaning is not."},
      {q:"The most frequent global supply chain risk factor (38%) is:",opts:["Currency fluctuation","Natural disasters","Performance of supply chain partners","Volatility of fuel prices"],ans:2,exp:"Performance of supply chain partners (38%) = the most frequently cited global SC risk — partners failing on time or quality."},
      {q:"Information Sharing as a SC integration pillar primarily helps to:",opts:["Reduce the bullwhip effect and enable early problem detection","Eliminate all transportation costs","Replace human decision-making with AI","Remove the need for safety stock entirely"],ans:0,exp:"Information Sharing reduces the bullwhip effect (everyone sees real demand) and enables early detection of supply problems before they become crises."},
      {q:"A fashion retailer should favour which SC approach for seasonal lines?",opts:["Cost efficiency over responsiveness","Responsiveness over cost — late delivery means zero sales","Centralised inventory near HQ","Pipeline transportation"],ans:1,exp:"For short-lifecycle products (fashion), responsiveness is critical — goods arriving after the season ends are worthless regardless of cost savings."},
      {q:"Maintaining multiple suppliers for your top-selling component is called:",opts:["Increasing Capacity","CPFR","Redundant Suppliers","Vertical Integration"],ans:2,exp:"Redundant Suppliers = multiple suppliers for critical/high-volume products. If one supplier fails, others fill the gap."},
      {q:"Pipeline transportation is ONLY suitable for:",opts:["Fresh produce","Packaged consumer goods","Oil, gas, and other liquids","Electronic components"],ans:2,exp:"Pipeline = fixed infrastructure designed only for liquids (oil, gas, water). Cannot transport solid goods — high capital cost but very low operating cost once built."},
      {q:"Trucking is preferred over rail for:",opts:["Transporting iron ore across a continent","Small loads requiring point-to-point and last-mile delivery flexibility","International container shipping","Liquid petroleum transport"],ans:1,exp:"Trucking = best for small loads and point-to-point flexible delivery. Rail requires fixed tracks — trucking reaches any address. Essential for last-mile delivery."},
      {q:"SC Integration's 'Coordinated Workflow' pillar produces:",opts:["Lower transportation costs only","Production efficiencies, fewer delays, fewer defects, and faster time to market","Elimination of all safety stock","Replacement of suppliers with direct sourcing"],ans:1,exp:"Coordinated Workflow = partners align production, procurement, and operations schedules — resulting in production efficiencies, fewer delays, fewer defects, faster time to market."},
      {q:"Amazon's same-day delivery warehouses located near major cities are an example of:",opts:["Pipeline transportation","Strategic Fit — SC strategy aligned to competitive strategy of fast delivery","Global risk mitigation","Outsourcing core competency"],ans:1,exp:"Amazon's SC strategy (massive nearby warehouses, own logistics) perfectly aligns with its competitive strategy (fastest delivery) = textbook Strategic Fit."},
      {q:"Natural disasters are ranked #__ in global SC risk factors:",opts:["#1 at 38%","#2 at 37%","#3 at 35%","#4 at 33%"],ans:2,exp:"Natural disasters rank #3 at 35%. #1 = Partner Performance (38%), #2 = Fuel Price Volatility (37%), #3 = Natural Disasters (35%)."},
      {q:"Intermodal transportation combines:",opts:["Air and pipeline","Sea/rail efficiency with truck last-mile flexibility","Rail and air","Truck and pipeline"],ans:1,exp:"Intermodal = uses sea or rail for long-distance (efficiency) then switches to trucks for last-mile delivery (flexibility). Balances cost and reach."},
      {q:"'Favour responsiveness over cost' is the recommended approach for:",opts:["Commodity products like steel","Short-lifecycle products like fashion and gadgets","Long-lifecycle industrial equipment","Raw material transport"],ans:1,exp:"Short-lifecycle products (fashion, electronics) = favour responsiveness. A late delivery is worthless. Cost savings are irrelevant if goods arrive after demand has passed."},
      {q:"The 'Make or Buy' decision in sourcing asks:",opts:["Should we make our products cheaper or buy better ones?","Should we produce this activity in-house (core competency) or outsource it (efficiency/expertise)?","Should we buy competitor companies?","Should we manufacture or import?"],ans:1,exp:"Make or Buy = in-house when it's a core competency that defines competitive advantage; outsource when you need efficiency or expertise outside your core skills."},
      {q:"Fuel price volatility ranks #__ in global SC risks:",opts:["#1 at 38%","#2 at 37%","#3 at 35%","#4 at 33%"],ans:1,exp:"Fuel Price Volatility = #2 at 37%. Sudden fuel cost changes make logistics budgeting and pricing to customers extremely difficult."},
      {q:"The TWO pillars of SC Integration are:",opts:["Cost reduction and speed","Information Sharing and Coordinated Workflow","Outsourcing and automation","Transportation optimisation and inventory reduction"],ans:1,exp:"SC Integration's two pillars = (1) Information Sharing (real-time data across partners) and (2) Coordinated Workflow (aligned production, procurement, and operations)."},
      {q:"'Decentralised capacity near markets' is recommended for which demand type?",opts:["Unpredictable demand","Predictable, stable demand — place capacity close to where demand is known","High-value luxury products","Commodity products only"],ans:1,exp:"Decentralised capacity = recommended for PREDICTABLE demand. Place capacity near known markets. Centralised capacity = recommended for UNPREDICTABLE demand (easier to pool and respond)."},
      {q:"Rail transportation's main disadvantage is:",opts:["Highest cost per unit","Unreliability","Slow speed and inflexibility — requires fixed tracks","Most environmental damage"],ans:2,exp:"Rail = slow and inflexible (fixed tracks, set schedules). Cannot reach all destinations. Not economical for small loads. Good only for bulk, predictable, long-distance routes."},
    ]
  },

  {
    id:"sysec",title:"System Security",
    sub:"CIA Triad · Threats · Malware Types · Online Crime",
    content:[
      {type:"p",text:"Computer security was originally engineered by the US Department of Defense to protect military intelligence. Today computers process financial payments, purchase orders, and legal authorisations — making security a global concern."},
      {type:"h",text:"The CIA Triad — Three Pillars of Security"},
      {type:"cards",items:[
        {t:"Confidentiality",b:"Data accessible ONLY to authorised individuals. Includes Privacy (user controls what's collected) and Secrecy (hiding data via encryption and access controls)."},
        {t:"Integrity",b:"Data received = exactly what was sent — not altered by unauthorised parties. Prevents attackers changing a $100 payment to $1,000 in transit."},
        {t:"Necessity (Availability)",b:"Authorised users have reliable access to systems when needed. Prevents DoS attacks blocking legitimate users from their banking app."},
      ]},
      {type:"h",text:"Malware — Four Types"},
      {type:"cards",items:[
        {t:"Virus",b:"Attaches to a legitimate file. Requires HUMAN ACTION (opening an attachment) to activate and spread. Goal: corrupt or delete data."},
        {t:"Worm",b:"Spreads AUTOMATICALLY across networks — NO human action needed. Copies itself machine to machine. Goal: consume bandwidth, crash systems."},
        {t:"Trojan Horse",b:"Disguises as something useful (free game). User installs WILLINGLY. Goal: create a backdoor for hackers to enter."},
        {t:"Spyware",b:"Silently bundled with downloads. User UNAWARE it's running. Goal: steal passwords, track browsing, harvest credentials."},
      ]},
      {type:"hl",text:"<strong>DoS vs DDoS:</strong> DoS = attack from ONE computer sending millions of fake requests. DDoS = THOUSANDS of hijacked devices (botnet) simultaneously — dramatically harder to block."},
    ],
    questions:[
      {q:'An attacker changes "$100" to "$1,000" in a payment message during transmission. Which CIA pillar is violated?',opts:["Confidentiality","Integrity","Necessity (Availability)","Privacy"],ans:1,exp:"Integrity = data received must be exactly what was sent, unaltered. Changing the payment amount = active wiretapping = integrity attack."},
      {q:"A DDoS attack blocks all users from accessing an online banking site. Which CIA pillar is threatened?",opts:["Confidentiality","Integrity","Necessity (Availability)","Secrecy"],ans:2,exp:"Necessity/Availability = authorised users must have reliable access when needed. A DDoS attack denies access to legitimate users."},
      {q:"Malware that spreads automatically from machine to machine across a network with no human action is a:",opts:["Virus","Trojan Horse","Worm","Spyware"],ans:2,exp:"Worm = self-propagating malware that copies itself across networks without any human trigger — unlike viruses which need a human to open a file."},
      {q:'A "free game download" secretly installs backdoor software. This is a:',opts:["Worm","Virus","Spyware","Trojan Horse"],ans:3,exp:"Trojan Horse = malware disguised as useful/legitimate software. The user installs it willingly — then it creates a backdoor for attackers."},
      {q:"Software that captures packets on public Wi-Fi and reads unencrypted data is called a:",opts:["Backdoor","Sniffer Program","DNS Spoofer","Active Wiretap"],ans:1,exp:"Sniffer Program = software capturing network packets on unencrypted channels (like public Wi-Fi) and reading data as it travels."},
      {q:"DNS Spoofing works by:",opts:["Flooding servers with traffic","Replacing a real website address with a fake copy to redirect users","Installing spyware via DNS servers","Sniffing DNS packets on public networks"],ans:1,exp:"DNS Spoofing = substituting a fake IP address for a real one — users think they're on their bank's site but they're on the attacker's copy."},
      {q:"A DDoS attack differs from DoS because DDoS:",opts:["Uses more sophisticated code","Targets only mobile devices","Uses thousands of hijacked devices simultaneously from around the world","Is faster but less damaging"],ans:2,exp:"DDoS = uses a botnet of thousands of hijacked devices worldwide simultaneously. Much harder to block than a single-source DoS attack."},
      {q:"Spyware is characterised primarily by:",opts:["Spreading automatically without human action","Appearing as a legitimate useful program","Running silently without the user's knowledge to steal data","Altering data in transit"],ans:2,exp:"Spyware runs silently — the user is completely unaware it's installed or running. It harvests credentials, browsing history, and sensitive data."},
      {q:"'Privacy' as part of Confidentiality means:",opts:["Data is encrypted on the server","The user controls what personal information is collected about them","Data is only visible to IT administrators","Passwords are stored in plain text"],ans:1,exp:"Privacy = the user's right to control what data is collected about them. It's the user-centric dimension of Confidentiality — distinct from Secrecy (organisational data hiding)."},
      {q:"A virus requires which condition to activate and spread?",opts:["A network connection","Automatic self-replication","Human action — opening an infected file or attachment","Root access to the system"],ans:2,exp:"Virus = requires HUMAN ACTION to activate (opening an email attachment, running an infected file). This distinguishes it from worms which spread automatically."},
      {q:"'Passive Wiretapping' is different from 'Active Wiretapping' because passive:",opts:["Alters data in transit","Only LISTENS without altering data — a confidentiality breach, not an integrity attack","Is more dangerous","Requires physical access to cables"],ans:1,exp:"Passive Wiretapping = eavesdropping only, no data alteration. Violates CONFIDENTIALITY. Active Wiretapping alters data in transit — violates INTEGRITY."},
      {q:"Phishing attacks primarily threaten which CIA pillar?",opts:["Integrity — they change data","Necessity — they block access","Confidentiality — they trick users into revealing private information","Availability — they crash systems"],ans:2,exp:"Phishing = social engineering to trick users into revealing confidential info (passwords, card numbers). Primary threat = CONFIDENTIALITY breach."},
      {q:"Computer security was ORIGINALLY developed by:",opts:["Private banks","The US Department of Defense to protect military intelligence","Silicon Valley tech companies","Internet service providers"],ans:1,exp:"Computer security originated with the US Department of Defense — protecting classified military intelligence on early isolated machines that later became networked."},
      {q:"A 'backdoor' in computing is:",opts:["A physical back door to a server room","An electronic hole allowing access without authentication — often installed by malware","A spare login account for IT administrators","A type of encryption algorithm"],ans:1,exp:"Backdoor = electronic hole bypassing normal authentication — often planted by malware (like Netcat) to give attackers persistent covert access."},
      {q:"Cyber Crime is defined as:",opts:["Using a computer as a tool for any illegal act","Criminal activities conducted via the internet — computer + network + crime","Physical theft of computer equipment","Illegal software piracy only"],ans:1,exp:"Cyber Crime = criminal activities conducted over the internet — it combines computer + network + criminal intent. Example: online fraud, identity theft, phishing campaigns."},
      {q:"Which malware type has the goal of CONSUMING BANDWIDTH and crashing systems?",opts:["Trojan Horse","Spyware","Worm","Virus"],ans:2,exp:"Worm's primary goal = consume bandwidth by replicating across every reachable machine, eventually crashing systems under the load of its own copies."},
      {q:"A hacker replacing a website's home page with their own message is:",opts:["Phishing","Active Wiretapping","Cyber Vandalism — an Integrity threat","Sniffer attack"],ans:2,exp:"Cyber Vandalism = damaging or destroying digital property — replacing website content with the attacker's message. It's an Integrity attack (unauthorised alteration of data)."},
      {q:"Cyber Terrorism differs from Cyber Crime in that Cyber Terrorism is:",opts:["Always financially motivated","Politically motivated, designed to cause social disruption or fear","Always performed by nation-states","Targeting only government systems"],ans:1,exp:"Cyber Terrorism = politically motivated internet attacks designed to cause disruption, fear, or social panic — not primarily financial. Cyber Crime is typically profit-motivated."},
      {q:"An e-commerce site unknowingly collecting customer location data without consent violates:",opts:["Integrity","Necessity","Confidentiality — specifically the Privacy dimension","Availability"],ans:2,exp:"Privacy = users control what data is collected about them. Collecting location data without consent violates the Privacy dimension of Confidentiality."},
      {q:"Which statement about Trojans vs Worms is CORRECT?",opts:["Both spread automatically","Trojans require user action to install; worms spread automatically","Worms require user action; Trojans spread automatically","Both require human action to activate"],ans:1,exp:"Trojans = require USER to install them willingly (disguised as useful software). Worms = spread AUTOMATICALLY with no human action, exploiting network vulnerabilities."},
    ]
  },
  /* ═══════════════════════════════════════════════ MODULE 9 */
  {
    id:"mansec",title:"Managing Security",
    sub:"IT Risk Management · Security Policy · Cryptography · SSL · Forensics",
    content:[
      {type:"hl",text:"<strong>IT Risk Formula:</strong> Risk = Probability × Impact (Cost). This determines which quadrant a risk falls into and therefore which management strategy to apply."},
      {type:"h",text:"The Four Risk Quadrants"},
      {type:"cards",items:[
        {t:"Q1: High Prob, Low Impact → Contain & Control",b:"Happens frequently but isn't devastating. Manage through standard procedures. E.g. minor system slow-downs during peak usage."},
        {t:"Q2: High Prob, High Impact → Prevent at All Costs",b:"Most critical category — both likely AND catastrophic. E.g. frequent DDoS on a financial services site."},
        {t:"Q3: Low Prob, Low Impact → Ignore (Accept)",b:"Unlikely and low damage. Cost of security outweighs benefit. E.g. minor website defacement in a niche industry."},
        {t:"Q4: Low Prob, High Impact → Insurance/Disaster Plan",b:"Catastrophic if it happens, but unlikely. E.g. earthquake destroying the data centre."},
      ]},
      {type:"h",text:"Cryptography & PKI"},
      {type:"cards",items:[
        {t:"Cryptography",b:"Hiding or encoding information using mathematical techniques so only the intended recipient — with the correct key — can read it."},
        {t:"PKI (Public Key Infrastructure)",b:"System for creating, storing, and distributing digital certificates. Backbone of internet security."},
        {t:"Digital Certificate",b:'Electronic "passport" proving authenticity. CA = Passport Office; Digital Certificate = Your Passport.'},
        {t:"Steganography",b:"Hiding information WITHIN other data — hides the EXISTENCE of the message (not just its content, unlike cryptography)."},
        {t:"Hash Coding",b:"One-way digital fingerprint. Even one character change produces a completely different hash. Used to verify data integrity."},
      ]},
      {type:"hl",text:"<strong>SSL Handshake:</strong> (1) Client Hello — announces encryption it supports. (2) Server sends Digital Certificate. (3) Client creates Session Key, encrypts with server's public key, sends it. (4) Secure encrypted session begins. HTTP = plain text postcard. HTTPS = sealed tamper-proof envelope."},
    ],
    questions:[
      {q:"Frequent DDoS attacks on a bank's website fall into which risk quadrant?",opts:["Q1: High Prob, Low Impact — Contain & Control","Q2: High Prob, High Impact — Prevent at All Costs","Q3: Low Prob, Low Impact — Ignore","Q4: Low Prob, High Impact — Insurance"],ans:1,exp:"Frequent (high probability) + devastating impact on financial services (high impact) = Q2. Demands active, expensive measures to prevent occurrence."},
      {q:"An earthquake destroying the data centre falls into:",opts:["Q1: High Prob, Low Impact","Q2: High Prob, High Impact","Q3: Low Prob, Low Impact","Q4: Low Prob, High Impact"],ans:3,exp:"Earthquakes are rare (low probability) but catastrophic if they occur (high impact) = Q4. Strategy = insurance and disaster recovery plans."},
      {q:"The IT Risk formula is:",opts:["Risk = Assets − Controls","Risk = Threat × Vulnerability","Risk = Probability × Impact","Risk = Cost × Time"],ans:2,exp:"Risk = Probability × Impact (Cost). This determines which quadrant a risk falls into and which management strategy to apply."},
      {q:"Steganography differs from cryptography because steganography:",opts:["Is stronger encryption","Hides the existence of the message, not just its content","Is used only for email security","Requires a public key"],ans:1,exp:"Steganography hides that a message exists at all — unlike cryptography which scrambles the message but doesn't hide that communication occurred."},
      {q:'A hash code is a "digital fingerprint" because:',opts:["It identifies people biometrically","It is unique to the data and changes entirely with even one character modification","It can be reversed to recover original data","It uses fingerprint scanner hardware"],ans:1,exp:"Hash codes are unique to their input — even a single character change produces a completely different hash, making them perfect for detecting tampering."},
      {q:"In SSL, the Session Key is:",opts:["A permanent encryption key stored on the server","A one-time symmetric key used only for a single session, then discarded","The same as the server's public key","A password entered by the user"],ans:1,exp:"Session Key = temporary, one-time-use symmetric key created for a single web session. Discarded when the session ends — providing forward secrecy."},
      {q:"A Certification Authority (CA) is analogous to:",opts:["A passport office — it issues and vouches for digital certificates","A firewall — it blocks unauthorised traffic","A hash function — it verifies data integrity","A VPN — it encrypts network traffic"],ans:0,exp:"CA = Passport Office. Digital Certificate = your Passport. The CA issues and vouches for authenticity of digital certificates, enabling online identity verification."},
      {q:"Ethical Hacking (White Hat) involves:",opts:["Hacking without legal permission but for good reasons","Testing systems for vulnerabilities with the legal owner's explicit permission","Only testing systems after a breach has occurred","Writing malware to test antivirus software"],ans:1,exp:"Ethical Hacking = testing systems using the same tools as malicious hackers, but with explicit legal permission from the owner — finding vulnerabilities before Black Hats do."},
      {q:"A security risk that occurs very rarely but could bankrupt the company should be treated as:",opts:["Q1 — Contain & Control","Q2 — Prevent at All Costs","Q3 — Ignore","Q4 — Insurance/Disaster Plan"],ans:3,exp:"Rare (low probability) + catastrophic (high impact) = Q4. Strategy = transfer risk via insurance AND prepare a disaster recovery plan for when it happens."},
      {q:"HTTP vs HTTPS: the key difference is:",opts:["HTTPS is faster","HTTP requires a login; HTTPS doesn't","HTTPS encrypts data using SSL/TLS; HTTP sends data in plain text","HTTPS is only for e-commerce sites"],ans:2,exp:"HTTPS = HTTP + SSL/TLS encryption. Data transmitted over HTTPS is encrypted — intercepted data is unreadable gibberish. HTTP sends everything as plain readable text."},
      {q:"Step 1 of the SSL handshake is:",opts:["Server sends its Digital Certificate","Client sends the Session Key","Client Hello — browser announces supported encryption algorithms","Secure session begins"],ans:2,exp:"Step 1 = Client Hello. The browser announces which encryption algorithms and key lengths it supports, starting the negotiation with the server."},
      {q:"'Asset Identification' in a Security Policy means:",opts:["Identifying key employees","Creating an inventory of all hardware, software, and data assets to know what needs protection","Listing all company bank accounts","Identifying company building assets"],ans:1,exp:"Asset Identification = the first element of a Security Policy — you cannot protect what you haven't catalogued. Lists all hardware, software, and data assets."},
      {q:"A firewall is characterised by which THREE properties?",opts:["Cheap, fast, and automatic","All traffic passes through it, only authorised traffic is allowed, and it must be immune to penetration","It only blocks incoming traffic","It requires human approval for each packet"],ans:1,exp:"Firewall = (1) all traffic passes through it, (2) only authorised traffic is allowed, (3) must be immune to penetration itself. Three essential properties."},
      {q:"Computer Forensics is responsible for:",opts:["Breaking into systems to find vulnerabilities","Collection, preservation, and analysis of computer-related evidence for legal proceedings","Managing firewall rules","Installing antivirus software"],ans:1,exp:"Computer Forensics = using investigative techniques to collect, preserve, and analyse digital evidence — maintaining chain of custody for use in court."},
      {q:"PKI (Public Key Infrastructure) is:",opts:["A type of firewall","A system for creating, storing, and distributing digital certificates — the backbone of internet security","A password management system","A type of VPN"],ans:1,exp:"PKI = the system (policies, hardware, software, procedures) for managing public-key encryption and digital certificates — it's what makes HTTPS and digital identity possible."},
      {q:"An Audit Trail records:",opts:["Only failed login attempts","All access attempts: who logged in, when, from which IP, and which files were accessed","Only files that were deleted","Only administrator activity"],ans:1,exp:"Audit Trail = comprehensive log of all access attempts — who, when, from where, what they accessed. Essential for forensic investigation after a breach."},
      {q:"Q3 risks (Low Probability, Low Impact) should be:",opts:["Prevented at all costs","Transferred to insurance","Ignored — cost of security outweighs the benefit","Controlled through standard procedures"],ans:2,exp:"Q3 = Low Prob, Low Impact = IGNORE (accept). Spending significant resources protecting against unlikely, low-damage events is economically irrational."},
      {q:"Behaviour Standards in a Security Policy specify:",opts:["Hardware installation procedures","What actions employees are permitted and prohibited — e.g. strong passwords required, credential sharing prohibited","Software version requirements","Budget allocation for security"],ans:1,exp:"Behaviour Standards = acceptable (strong passwords, locked screens) and unacceptable (sharing credentials, installing unauthorised software) employee behaviours — written rules."},
      {q:"Intrusion Detection Systems (IDS) do which of the following?",opts:["Block all incoming network traffic","Analyse network traffic to identify suspicious behaviour and vulnerabilities","Replace the need for firewalls","Only monitor internal employee activity"],ans:1,exp:"IDS = analyses network traffic, assesses vulnerabilities, and identifies suspicious behaviour patterns. It monitors and alerts — it works alongside, not instead of, firewalls."},
      {q:"In the SSL handshake, the Session Key is encrypted with the server's:",opts:["Session Key","Private Key","Public Key","Symmetric Key"],ans:2,exp:"The client encrypts the Session Key with the SERVER'S PUBLIC KEY before sending it. Only the server's private key can decrypt it — ensuring only the server can read the session key."},

  },
  /* ═══════════════════════════════════════════════ MODULE 10 */
  {

      {type:"h",text:"e-Business vs e-Commerce"},

        {t:"e-Commerce (Subset)",b:"Commerce specifically — buying and selling — electronically. All e-Commerce is e-Business, but not all e-Business is e-Commerce."},

      {type:"cards",items:[
        {t:"B2C — Business to Consumer",b:"Businesses selling directly to individuals online. Most visible to everyday people. E.g. Amazon, Daraz, Flipkart."},
        {t:"B2B — Business to Business",b:"Transactions between businesses — procurement, bulk purchasing, digital invoicing. Much larger total volume than B2C."},
        {t:"Business Processes",b:"Internal buying/selling operations — ERP systems, logistics management, digital supply chain platforms."},
        {t:"C2C — Consumer to Consumer",b:"Individuals buying/selling among themselves via a platform. Platform earns fees without owning inventory. E.g. eBay, Facebook Marketplace."},

      {type:"hl",text:"<strong>Five Secure e-Commerce Requirements:</strong> (1) SSL Certificate. (2) Layered Security. (3) Firewalls. (4) Regular Malware Scanning. (5) Confidentiality — encryption at rest and access controls."},

    questions:[
      {q:"A company uses the internet for internal collaboration, customer service, and digital supply chain management. This is:",opts:["e-Commerce","B2B","e-Business","C2C"],ans:2,exp:"e-Business = all business activities via telecommunications networks — not just buying/selling but servicing customers, collaborating with partners, managing operations."},
      {q:"eBay connecting individual buyers and sellers who trade directly with each other is:",opts:["B2C","B2B","B2G","C2C"],ans:3,exp:"C2C (Consumer to Consumer) = individuals buying and selling among themselves using a platform as intermediary. eBay earns fees without owning inventory."},
      {q:"A business operating both a website and physical retail stores is called:",opts:["Dot-Com","Bricks and Mortar","Bricks and Clicks","Pure Hybrid"],ans:2,exp:"Bricks and Clicks = business operating BOTH online AND via physical stores. Gets digital convenience and physical presence simultaneously."},
      {q:"Which factor MOST drove e-Business growth by making the internet accessible to non-technical users?",opts:["EDI standardisation","TCP/IP protocols reducing costs","Standard user interface — web browsers","Government e-commerce regulations"],ans:2,exp:"Standard User Interface = web browsers (Netscape, then Chrome) gave everyone a common, easy way to access the internet. This democratised e-business."},
      {q:"A Kathmandu business selling handmade crafts directly to customers in Japan online is:",opts:["B2B","B2G","B2C","C2C"],ans:2,exp:"B2C (Business to Consumer) = businesses selling directly to individual consumers via the web — regardless of geographic distance."},
      {q:"Why are perishable foods a poor fit for pure e-commerce?",opts:["They are too cheap to ship profitably","They require physical inspection or cannot survive shipping delays","They have no digital equivalent","Governments regulate food e-commerce too strictly"],ans:1,exp:"Product Limitations = perishable foods spoil in transit and customers want to physically inspect quality — poor fits for pure online commerce."},
      {q:"Layered security in e-commerce includes:",opts:["Just an SSL certificate","Only a password requirement","Multiple overlapping security layers — WAF, CDN, application, and database security working together","A single strong firewall"],ans:2,exp:"Layered Security = multiple overlapping security layers (WAF, CDN, application, database) — multiple obstacles attackers must break through sequentially."},
      {q:"AI-driven price monitoring enables businesses to:",opts:["Set prices once annually","Instantly compare rivals' pricing and respond dynamically in real time","Eliminate the need for human pricing teams","Guarantee the lowest price always"],ans:1,exp:"AI-Driven Price Monitoring = instantly compares competitor pricing and policies in real time — enabling dynamic responses without manual monitoring."},

      {q:"TCP/IP protocols accelerated e-Business growth by:",opts:["Creating a faster internet","Standardising network communication — reducing implementation and training costs dramatically","Making all software free","Replacing EDI systems"],ans:1,exp:"TCP/IP standardised how computers communicate over networks — one set of rules everyone follows. Dramatically reduced implementation costs and complexity of connecting to the internet."},

      {q:"The first requirement for secure e-commerce is:",opts:["A loyalty programme","An SSL Certificate — encrypting all sensitive user information to protect from cyber-attacks","A refund policy","A physical store as backup"],ans:1,exp:"SSL Certificate = the foundation of e-commerce security. Creates an HTTPS encrypted connection (the padlock) — all sensitive data (card numbers, passwords) is encrypted in transit."},

const scores={},completed={};
 
function updateGlobalProgress(){
  const done=Object.keys(completed).length;
  const pct=Math.round((done/MODULES.length)*100);
  document.getElementById("globalBar").style.width=pct+"%";
  document.getElementById("globalLabel").textContent=done+" of "+MODULES.length+" modules completed";
  document.querySelectorAll(".tab-btn[data-mid]").forEach(btn=>{
    if(btn.dataset.mid==="home")return;
    btn.classList.toggle("done",!!completed[btn.dataset.mid]);
  });
  document.querySelectorAll(".home-card").forEach(card=>{
    const mid=card.dataset.mid;
    card.classList.toggle("done-card",!!completed[mid]);
    const dot=card.querySelector(".status-dot");
    const lbl=card.querySelector(".status-lbl");
    if(completed[mid]){
      dot.style.background="var(--green)";
      lbl.textContent="Completed · "+scores[mid]+"/20";
      lbl.style.color="var(--green)";
    }else{
      dot.style.background="var(--border)";
      lbl.textContent="Not started";
      lbl.style.color="var(--muted)";
    }
  });
}
 
function showTab(id){
  document.querySelectorAll(".pane").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const pane=document.getElementById("pane-"+id);
  if(pane)pane.classList.add("active");
  const btn=document.querySelector('.tab-btn[data-mid="'+id+'"]');
  if(btn)btn.classList.add("active");
  window.scrollTo(0,0);
}
 
function buildContent(blocks){
  return blocks.map(b=>{
    if(b.type==="p")return'<p class="content-p">'+b.text+"</p>";
    if(b.type==="h")return'<div class="sec-head">'+b.text+"</div>";
    if(b.type==="hl")return'<div class="hl-box">'+b.text+"</div>";
    if(b.type==="cards")return'<div class="card-grid">'+b.items.map(i=>'<div class="kcard"><div class="kcard-title">'+i.t+'</div><div class="kcard-body">'+i.b+"</div></div>").join("")+"</div>";
    return"";
  }).join("");
}
 
function buildQuizComponent(mod){
  const qs=mod.questions;
  let current=0,userAnswers=[],answered=false;
  const wrap=document.createElement("div");
  function render(){
    if(current>=qs.length){showResults();return;}
    const q=qs[current];
    answered=false;
    const score=userAnswers.filter((a,i)=>a===qs[i].ans).length;
    wrap.innerHTML=`<div class="quiz-wrap">
      <div class="quiz-meta">
        <span class="quiz-count">Question ${current+1} of ${qs.length}</span>
        <span class="quiz-score">Score: ${score}/${current}</span>
      </div>
      <div class="qbar"><div class="qbar-fill" style="width:${(current/qs.length)*100}%"></div></div>
      <div class="question-text">${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="opt-btn" data-i="${i}">${o}</button>`).join("")}</div>
      <div class="feedback-box" id="fb"></div>
      <div class="btn-row"><button class="next-btn" id="nxt">${current<qs.length-1?"Next →":"See results →"}</button></div>
    </div>`;
    wrap.querySelectorAll(".opt-btn").forEach(btn=>{
      btn.addEventListener("click",function(){
        if(answered)return;
        answered=true;
        const chosen=parseInt(this.dataset.i);
        userAnswers[current]=chosen;
        wrap.querySelectorAll(".opt-btn").forEach((b,i)=>{
          b.disabled=true;
          if(i===q.ans)b.classList.add("correct");
          if(i===chosen&&chosen!==q.ans)b.classList.add("wrong");
        });
        const fb=wrap.querySelector("#fb");
        fb.className="feedback-box "+(chosen===q.ans?"correct":"wrong");
        fb.textContent=(chosen===q.ans?"✓ Correct! ":"✗ Not quite. ")+q.exp;
        wrap.querySelector("#nxt").style.display="inline-block";
      });
    });
    wrap.querySelector("#nxt").addEventListener("click",()=>{current++;render();});
  }
  function showResults(){
    const score=userAnswers.filter((a,i)=>a===qs[i].ans).length;
    const pct=Math.round((score/qs.length)*100);
    scores[mod.id]=score;completed[mod.id]=true;updateGlobalProgress();
    const colour=pct>=85?"var(--green)":pct>=60?"var(--amber)":"var(--red)";
    const bg=pct>=85?"var(--green-bg)":pct>=60?"var(--amber-bg)":"var(--red-bg)";
    const msg=pct>=85?"Excellent — you have mastered this topic!":pct>=60?"Good work — review the highlighted areas.":"Keep studying — revisit the notes above.";
    const review=qs.map((q,i)=>{
      const ok=userAnswers[i]===q.ans;
      return`<div class="review-item">
        <div class="review-q">${i+1}. ${q.q}</div>
        <div class="review-correct-ans">✓ ${q.opts[q.ans]}</div>
        ${!ok?'<div class="review-wrong-ans">✗ Your answer: '+(q.opts[userAnswers[i]]||"Not answered")+"</div>":""}
        <div class="review-exp">${q.exp}</div>
      </div>`;
    }).join("");
    wrap.innerHTML=`<div class="quiz-wrap">
      <div class="results-wrap">
        <div class="results-big" style="color:${colour}">${score}/${qs.length}</div>
        <div class="results-pct">${pct}% correct</div>
        <div class="results-msg" style="background:${bg};color:${colour}">${msg}</div>
        <div class="results-btns">
          <button class="rbtn rbtn-primary" id="retake">Retake quiz</button>
          <button class="rbtn rbtn-secondary" id="notes-btn">Back to notes</button>
        </div>
      </div>
      <div class="review-list">${review}</div>
    </div>`;
    wrap.querySelector("#retake").addEventListener("click",()=>{current=0;userAnswers=[];render();});
    wrap.querySelector("#notes-btn").addEventListener("click",()=>{document.getElementById("inner-notes-"+mod.id).click();});
  }
  render();return wrap;
}
 
function buildModulePane(mod){
  const pane=document.createElement("div");
  pane.className="pane";pane.id="pane-"+mod.id;
  const tabRow=document.createElement("div");tabRow.className="inner-tab-row";
  const notesBtn=document.createElement("button");notesBtn.className="inner-tab active";notesBtn.id="inner-notes-"+mod.id;notesBtn.textContent="Study Notes";
  const quizBtn=document.createElement("button");quizBtn.className="inner-tab";quizBtn.textContent="Quiz ("+mod.questions.length+" questions)";
  tabRow.appendChild(notesBtn);tabRow.appendChild(quizBtn);
  const notesDiv=document.createElement("div");
  notesDiv.innerHTML=`<div class="module-wrap"><div class="module-title">${mod.title}</div><div class="module-sub">${mod.sub}</div>${buildContent(mod.content)}<button class="start-quiz-btn" id="goto-quiz-${mod.id}">Start Quiz (${mod.questions.length} Questions) →</button></div>`;
  const quizDiv=document.createElement("div");quizDiv.style.display="none";
  const quizComp=buildQuizComponent(mod);quizDiv.appendChild(quizComp);
  notesBtn.addEventListener("click",()=>{notesBtn.classList.add("active");quizBtn.classList.remove("active");notesDiv.style.display="";quizDiv.style.display="none";});
  quizBtn.addEventListener("click",()=>{quizBtn.classList.add("active");notesBtn.classList.remove("active");quizDiv.style.display="";notesDiv.style.display="none";});
  pane.appendChild(tabRow);pane.appendChild(notesDiv);pane.appendChild(quizDiv);
  setTimeout(()=>{const btn=document.getElementById("goto-quiz-"+mod.id);if(btn)btn.addEventListener("click",()=>quizBtn.click());},0);
  return pane;
}
 
function buildHome(){
  const pane=document.createElement("div");pane.className="pane active";pane.id="pane-home";
  const grid=document.createElement("div");grid.className="home-grid";
  MODULES.forEach((mod,i)=>{
    const card=document.createElement("div");card.className="home-card";card.dataset.mid=mod.id;
    card.innerHTML=`<div class="home-card-num">Module ${i+1}</div><div class="home-card-title">${mod.title}</div><div class="home-card-status"><span class="status-dot"></span><span class="status-lbl" style="color:var(--muted)">Not started</span></div>`;
    card.addEventListener("click",()=>showTab(mod.id));grid.appendChild(card);
  });
  pane.appendChild(grid);return pane;
}
 
const nav=document.getElementById("navInner");
const mainArea=document.getElementById("mainArea");
const homeBtn=document.createElement("button");
homeBtn.className="tab-btn active";homeBtn.dataset.mid="home";homeBtn.textContent="Home";
homeBtn.addEventListener("click",()=>showTab("home"));
nav.appendChild(homeBtn);mainArea.appendChild(buildHome());
MODULES.forEach((mod,i)=>{
  const btn=document.createElement("button");btn.className="tab-btn";btn.dataset.mid=mod.id;
  btn.textContent=(i+1)+". "+mod.title;
  btn.addEventListener("click",()=>showTab(mod.id));
  nav.appendChild(btn);mainArea.appendChild(buildModulePane(mod));
});
